<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fleet Registration | DockPilot</title>
  <style>
    :root {
      --edge-padding: clamp(12px, 1.6vw, 22px);
      --subheader-row-height: 45px;
      --panel: rgba(11, 24, 45, 0.92);
      --line: rgba(255, 255, 255, 0.1);
      --text: #eef4ff;
      --muted: #aebcda;
      --accent: #67d6ff;
      --accent-2: #72f1cb;
      --ok: #8ef0b1;
      --warn: #ffd28c;
      --blue-text: #163b73;
      --badge-fill: #093046;
      --badge-line: rgba(107, 215, 255, 0.24);
      --border: rgba(255, 255, 255, 0.1);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: var(--edge-padding);
      overflow-x: hidden;
      font-family: Inter, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at top left, #133977 0%, transparent 32%),
        radial-gradient(circle at bottom right, #0f8f98 0%, transparent 30%),
        linear-gradient(135deg, #06111f, #0a1830 40%, #07111e 100%);
      color: var(--text);
    }

    .manager-shell {
      width: min(1280px, 100%);
      max-width: calc(100vw - (2 * var(--edge-padding)));
      max-height: calc(100dvh - (2 * var(--edge-padding)));
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 10px;
    }

    .panel {
      width: 100%;
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .header-panel {
      display: grid;
      gap: 8px;
      position: relative;
    }

    .table-panel {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto auto;
    }

    .toolbar-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toolbar-actions {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      width: 158px;
      padding: 5px 10px;
      border-radius: 999px;
      color: var(--accent);
      background: var(--badge-fill);
      border: 1px solid var(--badge-line);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 2.4vw, 1.95rem);
      line-height: 1.1;
    }

    p,
    .muted {
      margin: 0;
      color: var(--muted);
      line-height: 1.35;
      font-size: 0.86rem;
    }

    .return-link,
    button {
      border: 0;
      border-radius: 12px;
      padding: 9px 13px;
      font-size: 0.86rem;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .return-link {
      width: 168px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
    }

    .secondary-btn {
      width: 158px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #04101d;
    }

    button[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .return-link:focus-visible,
    button:focus-visible {
      outline: 2px solid rgba(103,214,255,.5);
      outline-offset: 2px;
    }

    .return-link:hover,
    .return-link:focus-visible,
    .secondary-btn:hover,
    .secondary-btn:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(103,214,255,.60);
      background: linear-gradient(135deg, rgba(10,55,120,.80), rgba(8,110,130,.72));
    }

    .primary-btn:hover,
    .primary-btn:focus-visible {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    .status-note {
      margin: 0;
      padding: 7px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      line-height: 1.3;
      font-size: 0.8rem;
    }

    .status-note.success {
      color: var(--ok);
      background: rgba(142, 240, 177, 0.08);
      border-color: rgba(142, 240, 177, 0.18);
    }

    .status-note.error {
      color: var(--warn);
      background: rgba(255, 210, 140, 0.08);
      border-color: rgba(255, 210, 140, 0.18);
    }

    .status-note.warn {
      color: var(--warn);
      background: rgba(255, 210, 140, 0.08);
      border-color: rgba(255, 210, 140, 0.18);
    }

    .table-area {
      width: 100%;
      height: 100%;
      max-width: 100%;
      min-height: 0;
      position: relative;
      overflow-x: auto;
      overflow-y: auto;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #ffffff;
    }

    table {
      width: max-content;
      min-width: max(100%, 980px);
      border-collapse: separate;
      border-spacing: 0;
    }

    th,
    td {
      padding: 6px 10px;
      border-right: 1px dashed #1a243a;
      border-bottom: 1px dashed #1a243a;
      font-size: 0.9rem;
      min-width: 130px;
      height: 32px;
      vertical-align: middle;
      white-space: nowrap;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 4;
      background: var(--badge-fill);
      color: var(--accent);
      text-align: center;
      font-weight: 700;
    }

    .header-main {
      padding: 4px 0;
      font-size: 0.96rem;
      letter-spacing: 0.02em;
      color: #7de6ff;
    }

    .table-title-band {
      width: 100%;
      margin-bottom: 8px;
      border-radius: 16px 16px 0 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: var(--badge-fill);
      color: #7de6ff;
      text-align: center;
      font-weight: 700;
      font-size: 0.96rem;
      letter-spacing: 0.02em;
    }

    .header-main-shell {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      padding: 10px 16px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .subheader-top,
    .subheader-second,
    .left-head,
    .action-head {
      height: var(--subheader-row-height);
    }

    .subheader-top,
    .left-head,
    .action-head {
      top: 0;
    }

    .subheader-second {
      top: var(--subheader-row-height);
      z-index: 5;
    }

    .left-head,
    .row-label {
      position: sticky;
      left: 0;
      z-index: 8;
      width: 156px;
      min-width: 156px;
      text-align: center;
      background: var(--badge-fill);
      color: var(--accent);
      border-right: 2px dashed rgba(11, 36, 80, 0.85);
    }

    .row-label {
      font-weight: 700;
    }

    .left-head {
      z-index: 9;
      top: 0;
    }

    .data-cell,
    .subheader-cell {
      text-align: center;
      background: #ffffff;
      color: var(--blue-text);
      font-weight: 600;
    }

    .action-head,
    .action-cell {
      position: sticky;
      right: 0;
      width: 188px;
      min-width: 188px;
      text-align: center;
      color: var(--text);
      background: var(--panel);
    }

    .action-head {
      z-index: 7;
    }

    .action-cell {
      z-index: 3;
    }

    .action-head {
      color: transparent;
      top: 0;
    }

    .action-cell {
      padding-right: 56px;
    }

    .editable {
      cursor: text;
    }

    .editable:focus {
      outline: 2px solid rgba(107, 215, 255, 0.85);
      outline-offset: -3px;
    }

    .pair-divider {
      border-right: 2px dashed rgba(11, 36, 80, 0.85);
    }

    .table-controls {
      display: flex;
      justify-content: flex-start;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .horizontal-scroll-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .scroll-arrow {
      width: 36px;
      min-width: 36px;
      height: 36px;
      padding: 0 !important;
      flex-shrink: 0;
    }

    .horizontal-range {
      flex: 1;
      height: 20px;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
    }

    .horizontal-range::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
    }

    .horizontal-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: var(--thumb-width, 96px);
      height: 16px;
      margin-top: -5px;
      border-radius: 999px;
      border: 1px solid rgba(7, 17, 31, 0.18);
      background: linear-gradient(135deg, #67d6ff, #72f1cb);
      cursor: pointer;
    }

    .more-actions-dropdown {
      position: absolute;
      top: calc(36px + 2px + 20px);
      right: 16px;
      display: flex;
      width: 168px;
      z-index: 10;
    }

    .more-actions-dropdown.collapsed {
      flex-direction: row;
      align-items: center;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 2px;
      height: 36px;
      justify-content: center;
      align-items: center;
    }

    .more-actions-dropdown:not(.collapsed) {
      flex-direction: column;
      gap: 8px;
      background: rgba(11, 24, 45, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 8px;
      width: 168px;
    }

    .more-actions-toggle {
      padding: 9px 13px !important;
      border-radius: 12px !important;
      font-size: 0.86rem !important;
      font-weight: 700 !important;
      background: transparent !important;
      border: 1px solid transparent !important;
      color: var(--text) !important;
      cursor: pointer;
      flex-shrink: 0;
    }

    .more-actions-toggle:hover {
      transform: translateY(-2px);
      text-decoration: underline;
    }

    .more-actions-dropdown:not(.collapsed) .more-actions-toggle {
      align-self: stretch;
      padding: 9px 13px !important;
      width: auto;
      min-width: 0;
    }

    .more-actions-buttons {
      display: none;
      flex-direction: column;
      gap: 6px;
    }

    .more-actions-dropdown:not(.collapsed) .more-actions-buttons {
      display: flex;
    }

    .more-actions-dropdown button {
      width: 100%;
      justify-content: center;
      text-align: center;
      background: rgba(103, 214, 255, 0.12);
      border: 1px solid rgba(103, 214, 255, 0.24);
      color: var(--accent);
    }

    .more-actions-dropdown button:not(.more-actions-toggle):hover {
      background: rgba(103, 214, 255, 0.24);
      border-color: rgba(103, 214, 255, 0.5);
      color: var(--accent);
    }

    .more-actions-dropdown:not(.collapsed) button {
      width: 100%;
    }

    .more-actions-dropdown button:not(.more-actions-toggle):hover {
      background: rgba(103, 214, 255, 0.24);
      border-color: rgba(103, 214, 255, 0.5);
    }
    .hidden {
      display: none !important;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(4px);
    }

    .modal-card {
      background: rgba(11, 24, 45, 0.97);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.55);
      padding: 28px 32px 24px;
      min-width: 320px;
      max-width: 480px;
      width: 90%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-card h2 {
      margin: 0;
      font-size: 1.1rem;
      color: var(--text);
    }

    .modal-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .modal-actions button {
      flex: 1;
      min-width: 90px;
    }

    .modal-card .secondary-btn {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
    }

    .modal-card .secondary-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    @media (max-width: 900px) {
      .manager-shell {
        width: 100%;
      }

      .toolbar-row {
        align-items: flex-start;
      }

      .action-head,
      .action-cell {
        min-width: 170px;
        width: 170px;
      }

      .left-head,
      .row-label {
        min-width: 132px;
        width: 132px;
      }

      .header-main-shell {
        width: 280px;
        max-width: calc(100vw - 220px);
      }

      .vertical-scroll-controls {
        width: 34px;
        right: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="manager-shell">
    <section class="panel header-panel">
      <div class="toolbar-row">
        <span id="todayBadge" class="tag">Date:</span>
        <div class="toolbar-actions">
          <button id="loadFleetBtn" type="button" class="secondary-btn">Load Fleet</button>
          <button id="saveFleetBtn" type="button" class="secondary-btn">Save Fleet</button>
          <a class="return-link" href="./Frontpage.html">Return to Frontpage</a>
        </div>
      </div>

      <div id="moreActionsDropdown" class="more-actions-dropdown collapsed">
        <button id="moreActionsToggle" type="button" class="secondary-btn more-actions-toggle">See More</button>
        <div class="more-actions-buttons">
          <button id="modifyFleetBtn" type="button" class="secondary-btn">Modify Fleet</button>
          <button id="launchProjectBtn" type="button" class="secondary-btn">Launch Project</button>
          <button id="editProjectBtn" type="button" class="secondary-btn">Edit Project</button>
        </div>
      </div>

      <div>
        <h1>Fleet Registration</h1>
        <p class="muted">Manage fleet additions/deletions and superintendent allocation for vessels. This is an Admin Only function.</p>
      </div>
    </section>

    <p id="statusNote" class="status-note">Fleet table is ready.</p>

    <section class="panel table-panel">
      <div id="tableTitleBand" class="table-title-band">
        <div id="tableTitleBandText" class="header-main header-main-shell editable" data-header-type="main" contenteditable="true" spellcheck="false">Fleet Registration Matrix</div>
      </div>

      <div id="tableViewport" class="table-area">
        <table id="matrixTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div class="horizontal-scroll-controls" aria-label="Horizontal scroll controls">
        <button id="scrollLeftBtn" type="button" class="secondary-btn scroll-arrow" aria-label="Scroll left">◀</button>
        <input id="horizontalScroll" class="horizontal-range" type="range" min="0" max="0" value="0" step="1" />
        <button id="scrollRightBtn" type="button" class="secondary-btn scroll-arrow" aria-label="Scroll right">▶</button>
      </div>

      <div class="table-controls">
        <button id="addRowBtn" type="button" class="secondary-btn">Add Row</button>
        <button id="addColumnBtn" type="button" class="secondary-btn">Add Column</button>
        <button id="deleteLastColumnBtn" type="button" class="secondary-btn">Delete Last Column Pair</button>
      </div>
    </section>
  </main>

  <div id="modalOverlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <h2 id="modalTitle">Note</h2>
      <p id="modalMessage"></p>
      <div class="modal-actions">
        <button id="modalCancelBtn" type="button" class="secondary-btn hidden">No</button>
        <button id="modalConfirmBtn" type="button" class="primary-btn">Continue</button>
      </div>
    </div>
  </div>

  <input id="fleetFileInput" type="file" accept="application/json,.json" class="hidden" />

  <script type="module">
    import { supabase } from './supabaseClient.js';
    import { startDockPilotPageGuard } from './dockpilotPageGuard.js';

    const STATE_KEY = 'DOCKPILOT_FLEET_REG_STATE';
    const MIN_DATA_COLUMNS = 2;
    const MAX_CELL_CHARS = 30;
    const DEFAULT_MAIN_HEADER = 'Fleet Registration Matrix';
    const DEFAULT_SUBHEADER_ROW_A = ['Fleet Group Name', 'TM / FM Name', 'Fleet Group Name', 'TM / FM Name'];
    const DEFAULT_SUBHEADER_ROW_B = ['Vessel Name', 'TSI Name', 'Vessel Name', 'TSI Name'];
    const DEFAULT_ROW_LABELS = [
      'Vessel 1',
      'Vessel 2',
      'Vessel 3',
      'Vessel 4'
    ];

    const todayBadge = document.getElementById('todayBadge');
    const statusNote = document.getElementById('statusNote');
    const tableTitleBandText = document.getElementById('tableTitleBandText');
    const tableViewport = document.getElementById('tableViewport');
    const tableHead = document.getElementById('tableHead');
    const tableBody = document.getElementById('tableBody');
    const horizontalScroll = document.getElementById('horizontalScroll');
    const scrollLeftBtn = document.getElementById('scrollLeftBtn');
    const scrollRightBtn = document.getElementById('scrollRightBtn');
    const addRowBtn = document.getElementById('addRowBtn');
    const addColumnBtn = document.getElementById('addColumnBtn');
    const deleteLastColumnBtn = document.getElementById('deleteLastColumnBtn');
    const loadFleetBtn = document.getElementById('loadFleetBtn');
    const saveFleetBtn = document.getElementById('saveFleetBtn');
    const moreActionsDropdown = document.getElementById('moreActionsDropdown');
    const moreActionsToggle = document.getElementById('moreActionsToggle');
    const modifyFleetBtn = document.getElementById('modifyFleetBtn');
    const launchProjectBtn = document.getElementById('launchProjectBtn');
    const editProjectBtn = document.getElementById('editProjectBtn');
    const fleetFileInput = document.getElementById('fleetFileInput');

    const modalOverlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalMessage = document.getElementById('modalMessage');
    const modalConfirmBtn = document.getElementById('modalConfirmBtn');
    const modalCancelBtn = document.getElementById('modalCancelBtn');

    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const FLEET_FILE_NAME = 'default_fleet_dist.json';
    const FLEET_HANDLE_DB = 'dockpilot-fleet-file-handle-db';
    const FLEET_HANDLE_STORE = 'handles';
    const FLEET_HANDLE_KEY = 'default-fleet-handle';
    const INACTIVITY_AUTOSAVE_MS = 5 * 60 * 1000;

    let mainHeader = DEFAULT_MAIN_HEADER;
    let subHeaderRowA = [...DEFAULT_SUBHEADER_ROW_A];
    let subHeaderRowB = [...DEFAULT_SUBHEADER_ROW_B];
    let rowLabels = [...DEFAULT_ROW_LABELS];
    let matrixData = [];
    let continueAction = null;
    let cancelAction = null;
    let fleetFileHandle = null;
    let inactivityTimer = null;

    function formatBadgeDate(date) {
      const day = String(date.getDate()).padStart(2, '0');
      return `${day}-${monthNames[date.getMonth()]}-${date.getFullYear()}`;
    }

    function setStatus(text, tone = '') {
      statusNote.textContent = text;
      statusNote.className = `status-note${tone ? ` ${tone}` : ''}`;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function defaultHeaderA(colIndex) {
      return colIndex % 2 === 0 ? 'Fleet Group Name' : 'TM / FM Name';
    }

    function normalizeMainHeader(value) {
      const nextValue = sanitizeLineBreaks(String(value ?? ''));
      if (isMeaningfullyBlank(nextValue)) {
        return DEFAULT_MAIN_HEADER;
      }
      if (/^Fleet Registration Matrixs+$/i.test(nextValue.trim())) {
        return DEFAULT_MAIN_HEADER;
      }
      return nextValue;
    }

    function defaultHeaderB(colIndex) {
      return colIndex % 2 === 0 ? 'Vessel Name' : 'TSI Name';
    }

    function defaultRowLabel(rowIndex) {
      return `Vessel ${rowIndex + 1}`;
    }

    function normalizeRowLabelsToSequence(labels = rowLabels) {
      return labels.map((_, index) => defaultRowLabel(index));
    }

    function isPairDivider(colIndex) {
      return colIndex % 2 === 1;
    }

    function sanitizeLineBreaks(text) {
      return String(text ?? '').replace(/[\r\n]+/g, ' ');
    }

    function isMeaningfullyBlank(text) {
      return sanitizeLineBreaks(text).trim().length === 0;
    }

    function truncateToMax(text, maxChars = MAX_CELL_CHARS) {
      return String(text ?? '').slice(0, maxChars);
    }

    function isConstrainedCell(cell) {
      return Boolean(cell && cell.matches('.editable[contenteditable="true"]') && !cell.classList.contains('header-main'));
    }

    function setCellText(cell, value) {
      cell.textContent = value;
      const selection = window.getSelection();
      if (!selection) return;
      const range = document.createRange();
      range.selectNodeContents(cell);
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function normalizeCellText(cell, rawValue) {
      const singleLine = sanitizeLineBreaks(rawValue);
      const isConstrained = isConstrainedCell(cell);
      const nextValue = isConstrained ? truncateToMax(singleLine) : singleLine;
      return {
        value: nextValue,
        hadLineBreaks: /[\r\n]/.test(String(rawValue ?? '')),
        wasTruncated: isConstrained && singleLine.length > MAX_CELL_CHARS
      };
    }

    function syncScrollControls() {
      const maxScrollLeft = Math.max(0, tableViewport.scrollWidth - tableViewport.clientWidth);

      horizontalScroll.max = String(maxScrollLeft);
      horizontalScroll.value = String(Math.min(maxScrollLeft, Math.round(tableViewport.scrollLeft)));

      const atLeftStart = tableViewport.scrollLeft <= 1;
      const atLeftEnd = tableViewport.scrollLeft >= (maxScrollLeft - 1);

      scrollLeftBtn.disabled = atLeftStart;
      scrollRightBtn.disabled = atLeftEnd;
      horizontalScroll.disabled = maxScrollLeft === 0;

      const thumbRatio = tableViewport.scrollWidth > 0 ? tableViewport.clientWidth / tableViewport.scrollWidth : 1;
      const thumbPx = Math.max(24, Math.round(thumbRatio * horizontalScroll.offsetWidth));
      horizontalScroll.style.setProperty('--thumb-width', `${thumbPx}px`);

      const firstStickyRow = tableHead.querySelector('tr');
      if (firstStickyRow) {
        const firstRowHeight = Math.round(firstStickyRow.getBoundingClientRect().height) || 45;
        tableViewport.style.setProperty('--subheader-row-height', `${firstRowHeight}px`);
      }
    }

    function makeDefaultMatrix(labels = rowLabels, columns = subHeaderRowA.length) {
      return labels.map(() => Array(columns).fill(''));
    }

    function normalizeState(raw = {}, options = { useDefaultRowFloor: true }) {
      const useDefaultRowFloor = options?.useDefaultRowFloor !== false;
      const sourceHeaderA = Array.isArray(raw?.subHeaderRowA) ? raw.subHeaderRowA : [];
      const sourceHeaderB = Array.isArray(raw?.subHeaderRowB) ? raw.subHeaderRowB : [];
      const sourceMatrix = Array.isArray(raw?.matrixData) ? raw.matrixData : [];

      let dataColumnCount = Math.max(
        MIN_DATA_COLUMNS,
        sourceHeaderA.length,
        sourceHeaderB.length,
        sourceMatrix.reduce((max, row) => (Array.isArray(row) ? Math.max(max, row.length) : max), 0)
      );

      if (dataColumnCount % 2 !== 0) {
        dataColumnCount -= 1;
      }
      dataColumnCount = Math.max(MIN_DATA_COLUMNS, dataColumnCount);

      const nextHeaderA = Array.from({ length: dataColumnCount }, (_, index) => (
        sanitizeLineBreaks(String(sourceHeaderA[index] ?? '')).trim() || defaultHeaderA(index)
      ));

      const nextHeaderB = Array.from({ length: dataColumnCount }, (_, index) => (
        sanitizeLineBreaks(String(sourceHeaderB[index] ?? '')).trim() || defaultHeaderB(index)
      ));

      const sourceLabels = Array.isArray(raw?.rowLabels) ? raw.rowLabels : [];
      const minimumRowCount = useDefaultRowFloor ? DEFAULT_ROW_LABELS.length : 0;
      const rowCount = Math.max(minimumRowCount, sourceLabels.length, sourceMatrix.length);
      const nextLabels = Array.from({ length: rowCount }, (_, rowIndex) => (
        sanitizeLineBreaks(String(sourceLabels[rowIndex] ?? '')).trim() || defaultRowLabel(rowIndex)
      ));

      const nextMatrix = nextLabels.map((_, rowIndex) => (
        Array.from({ length: dataColumnCount }, (_, colIndex) => (
          sanitizeLineBreaks(String(sourceMatrix?.[rowIndex]?.[colIndex] ?? '')).trim()
        ))
      ));

      return {
        mainHeader: normalizeMainHeader(raw?.mainHeader ?? DEFAULT_MAIN_HEADER),
        subHeaderRowA: nextHeaderA,
        subHeaderRowB: nextHeaderB,
        rowLabels: normalizeRowLabelsToSequence(nextLabels),
        matrixData: nextMatrix
      };
    }

    function getFleetPayload() {
      return {
        mainHeader,
        subHeaderRowA,
        subHeaderRowB,
        rowLabels: normalizeRowLabelsToSequence(rowLabels),
        matrixData
      };
    }

    function supportsFileHandlePersistence() {
      return typeof indexedDB !== 'undefined' && 'showSaveFilePicker' in window;
    }

    function openFleetHandleDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(FLEET_HANDLE_DB, 1);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(FLEET_HANDLE_STORE)) {
            db.createObjectStore(FLEET_HANDLE_STORE);
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function persistFleetFileHandle(handle) {
      if (!supportsFileHandlePersistence() || !handle) return;
      try {
        const db = await openFleetHandleDb();
        await new Promise((resolve, reject) => {
          const tx = db.transaction(FLEET_HANDLE_STORE, 'readwrite');
          tx.objectStore(FLEET_HANDLE_STORE).put(handle, FLEET_HANDLE_KEY);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
        db.close();
      } catch (error) {
        console.error('Persist fleet file handle failed:', error);
      }
    }

    async function restoreFleetFileHandle() {
      if (!supportsFileHandlePersistence()) return null;
      try {
        const db = await openFleetHandleDb();
        const handle = await new Promise((resolve, reject) => {
          const tx = db.transaction(FLEET_HANDLE_STORE, 'readonly');
          const request = tx.objectStore(FLEET_HANDLE_STORE).get(FLEET_HANDLE_KEY);
          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => reject(request.error);
        });
        db.close();
        return handle;
      } catch (error) {
        console.error('Restore fleet file handle failed:', error);
        return null;
      }
    }

    async function hasWritePermission(handle, request = false) {
      if (!handle || typeof handle.queryPermission !== 'function') {
        return false;
      }
      try {
        const query = await handle.queryPermission({ mode: 'readwrite' });
        if (query === 'granted') return true;
        if (!request || typeof handle.requestPermission !== 'function') return false;
        const requested = await handle.requestPermission({ mode: 'readwrite' });
        return requested === 'granted';
      } catch (error) {
        console.error('Write permission check failed:', error);
        return false;
      }
    }

    async function writeFleetJsonToHandle(handle, showSuccessStatus = false) {
      if (!handle) return false;
      try {
        const writable = await handle.createWritable();
        await writable.write(JSON.stringify(getFleetPayload(), null, 2));
        await writable.close();
        if (showSuccessStatus) {
          setStatus(`Fleet distribution saved as ${FLEET_FILE_NAME}.`, 'success');
        }
        return true;
      } catch (error) {
        console.error('Write fleet JSON to handle failed:', error);
        return false;
      }
    }

    async function silentAutoSaveFleetFile() {
      if (!fleetFileHandle) return;
      const granted = await hasWritePermission(fleetFileHandle, false);
      if (!granted) return;
      await writeFleetJsonToHandle(fleetFileHandle, false);
    }

    function queueAutoSave() {
      saveState();
      void silentAutoSaveFleetFile();
    }

    function resetInactivityAutosaveTimer() {
      if (inactivityTimer) {
        window.clearTimeout(inactivityTimer);
      }
      inactivityTimer = window.setTimeout(() => {
        queueAutoSave();
      }, INACTIVITY_AUTOSAVE_MS);
    }

    function wireAutoSaveEvents() {
      const activityEvents = ['click', 'keydown', 'input', 'scroll', 'pointerdown', 'touchstart'];
      activityEvents.forEach((eventName) => {
        document.addEventListener(eventName, resetInactivityAutosaveTimer, { passive: true });
      });

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') {
          queueAutoSave();
        }
      });

      window.addEventListener('pagehide', () => {
        queueAutoSave();
      });

      window.addEventListener('beforeunload', () => {
        queueAutoSave();
      });

      resetInactivityAutosaveTimer();
    }

    function isValidFleetPayload(rawData) {
      if (!rawData || typeof rawData !== 'object' || Array.isArray(rawData)) {
        return false;
      }
      return Array.isArray(rawData.subHeaderRowA)
        && Array.isArray(rawData.subHeaderRowB)
        && Array.isArray(rawData.rowLabels)
        && Array.isArray(rawData.matrixData);
    }

    function loadState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STATE_KEY) || 'null');
        if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
          const saved = typeof structuredClone === 'function' ? structuredClone(parsed) : JSON.parse(JSON.stringify(parsed));
          return normalizeState(saved);
        }
      } catch (error) {
        console.error('Fleet registration state load failed:', error);
      }

      return normalizeState();
    }

    function saveState() {
      try {
        localStorage.setItem(STATE_KEY, JSON.stringify(getFleetPayload()));
      } catch (error) {
        console.error('Fleet registration state save failed:', error);
        setStatus('Storage limit reached. Changes are not persisted yet.', 'warn');
      }
    }

    function showDefaultFileMissingError() {
      showModal({
        title: 'Error',
        message: 'The file "default_fleet_dist.json" was not found in the working folder. Either locate and transfer the file in the working folder, or re-populate the Fleet Data!',
        confirmText: 'Continue'
      });
    }

    async function saveFleetToJsonFile() {
      try {
        if ('showSaveFilePicker' in window) {
          let handle = fleetFileHandle;
          const hasExistingAccess = await hasWritePermission(handle, false);
          if (!hasExistingAccess) {
            handle = await window.showSaveFilePicker({
              suggestedName: FLEET_FILE_NAME,
              types: [{
                description: 'JSON Files',
                accept: { 'application/json': ['.json'] }
              }]
            });

            if (!handle || handle.name !== FLEET_FILE_NAME) {
              showDefaultFileMissingError();
              return;
            }

            const granted = await hasWritePermission(handle, true);
            if (!granted) return;

            fleetFileHandle = handle;
            await persistFleetFileHandle(handle);
          }

          await writeFleetJsonToHandle(fleetFileHandle, true);
        } else {
          const payload = JSON.stringify(getFleetPayload(), null, 2);
          const blob = new Blob([payload], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = FLEET_FILE_NAME;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
          setStatus(`Fleet distribution saved as ${FLEET_FILE_NAME}.`, 'success');
        }
      } catch (error) {
        console.error('Save fleet file failed:', error);
      }
    }

    function applyLoadedFleet(rawData) {
      if (!isValidFleetPayload(rawData)) {
        showDefaultFileMissingError();
        return;
      }

      const loaded = normalizeState(rawData, { useDefaultRowFloor: false });
      mainHeader = loaded.mainHeader;
      subHeaderRowA = loaded.subHeaderRowA;
      subHeaderRowB = loaded.subHeaderRowB;
      rowLabels = normalizeRowLabelsToSequence(loaded.rowLabels);
      matrixData = loaded.matrixData;
      renderTable();
      setStatus(`Loaded fleet distribution from ${FLEET_FILE_NAME}.`, 'success');
    }

    function loadFleetFromSelectedFile(file) {
      if (!file || file.name !== FLEET_FILE_NAME) {
        showDefaultFileMissingError();
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result ?? '{}'));
          applyLoadedFleet(parsed);
        } catch (error) {
          console.error('Parse fleet file failed:', error);
          showDefaultFileMissingError();
        }
      };
      reader.onerror = () => {
        showDefaultFileMissingError();
      };
      reader.readAsText(file);
    }

    function showModal({
      title,
      message,
      confirmText = 'Continue',
      cancelText = '',
      onConfirm = null,
      onCancel = null
    }) {
      modalTitle.textContent = title;
      modalMessage.textContent = message;
      modalConfirmBtn.textContent = confirmText;
      modalCancelBtn.textContent = cancelText || 'No';
      modalCancelBtn.classList.toggle('hidden', !cancelText);
      continueAction = onConfirm;
      cancelAction = onCancel;
      modalOverlay.classList.remove('hidden');
      modalConfirmBtn.focus();
    }

    function closeModal(runCancel = false) {
      const pendingCancel = cancelAction;
      modalOverlay.classList.add('hidden');
      continueAction = null;
      cancelAction = null;
      if (runCancel && typeof pendingCancel === 'function') {
        pendingCancel();
      }
    }

    function renderTable() {
      const columnCount = subHeaderRowA.length;
      rowLabels = normalizeRowLabelsToSequence(rowLabels);

      tableTitleBandText.textContent = normalizeMainHeader(mainHeader);

      tableHead.innerHTML = `
        <tr>
          <th class="left-head" rowspan="2">Fleet Attribute</th>
          ${subHeaderRowA.map((label, colIndex) => `<th class="subheader-cell subheader-top editable ${isPairDivider(colIndex) ? 'pair-divider' : ''}" data-header-type="sub-a" data-col-index="${colIndex}" contenteditable="true" spellcheck="false">${escapeHtml(label)}</th>`).join('')}
          <th class="action-head" rowspan="2" aria-label="Row controls"></th>
        </tr>
        <tr>
          ${subHeaderRowB.map((label, colIndex) => `<th class="subheader-cell subheader-second editable ${isPairDivider(colIndex) ? 'pair-divider' : ''}" data-header-type="sub-b" data-col-index="${colIndex}" contenteditable="true" spellcheck="false">${escapeHtml(label)}</th>`).join('')}
        </tr>
      `;

      tableBody.innerHTML = rowLabels.map((label, rowIndex) => `
        <tr>
          <th scope="row" class="row-label" data-row-label-index="${rowIndex}" contenteditable="false" spellcheck="false">${escapeHtml(label)}</th>
          ${subHeaderRowA.map((_, colIndex) => `<td class="data-cell editable ${isPairDivider(colIndex) ? 'pair-divider' : ''}" data-row-index="${rowIndex}" data-col-index="${colIndex}" contenteditable="true" spellcheck="false">${escapeHtml(matrixData?.[rowIndex]?.[colIndex] ?? '')}</td>`).join('')}
          <td class="action-cell"><button type="button" class="secondary-btn row-delete-btn" data-delete-row-index="${rowIndex}">Delete Row</button></td>
        </tr>
      `).join('');

      deleteLastColumnBtn.disabled = subHeaderRowA.length <= MIN_DATA_COLUMNS;

      saveState();
      requestAnimationFrame(syncScrollControls);
    }

    function commitHeadCell(cell) {
      const headerType = cell.dataset.headerType;
      const nextValue = sanitizeLineBreaks(cell.textContent);

      if (headerType === 'main') {
        const oldValue = mainHeader;
        mainHeader = normalizeMainHeader(nextValue);
        if (oldValue !== mainHeader) {
          setStatus('Main header updated.', 'success');
        }
        renderTable();
        return;
      }

      const colIndex = Number(cell.dataset.colIndex);
      if (!Number.isFinite(colIndex) || colIndex < 0 || colIndex >= subHeaderRowA.length) {
        renderTable();
        return;
      }

      if (headerType === 'sub-a') {
        subHeaderRowA[colIndex] = truncateToMax(isMeaningfullyBlank(nextValue) ? defaultHeaderA(colIndex) : nextValue);
        setStatus('Subheader row A updated.', 'success');
      } else if (headerType === 'sub-b') {
        subHeaderRowB[colIndex] = truncateToMax(isMeaningfullyBlank(nextValue) ? defaultHeaderB(colIndex) : nextValue);
        setStatus('Subheader row B updated.', 'success');
      }

      renderTable();
    }

    function commitDataCell(cell) {
      const rowIndex = Number(cell.dataset.rowIndex);
      const colIndex = Number(cell.dataset.colIndex);
      const oldValue = matrixData?.[rowIndex]?.[colIndex] ?? '';
      const nextValue = truncateToMax(sanitizeLineBreaks(cell.textContent));

      if (!Array.isArray(matrixData[rowIndex])) {
        matrixData[rowIndex] = Array(subHeaderRowA.length).fill('');
      }

      matrixData[rowIndex][colIndex] = nextValue;
      if (oldValue !== nextValue) {
        setStatus(`Updated cell R${rowIndex + 1}C${colIndex + 1}.`, 'success');
      }
      renderTable();
    }

    function addRow() {
      rowLabels.push(defaultRowLabel(rowLabels.length));
      matrixData.push(Array(subHeaderRowA.length).fill(''));
      renderTable();
      setStatus('A new row has been added.', 'success');
    }

    function addColumn() {
      const nextIndex = subHeaderRowA.length;
      subHeaderRowA.push(defaultHeaderA(nextIndex), defaultHeaderA(nextIndex + 1));
      subHeaderRowB.push(defaultHeaderB(nextIndex), defaultHeaderB(nextIndex + 1));
      matrixData = rowLabels.map((_, rowIndex) => {
        const sourceRow = Array.isArray(matrixData[rowIndex]) ? matrixData[rowIndex] : [];
        return [...sourceRow, '', ''];
      });
      renderTable();
      setStatus('A new column pair has been added.', 'success');
    }

    function deleteRow(rowIndex) {
      const removedLabel = rowLabels[rowIndex] || `Row ${rowIndex + 1}`;
      rowLabels.splice(rowIndex, 1);
      matrixData.splice(rowIndex, 1);
      renderTable();
      setStatus(`${removedLabel} has been deleted.`, 'success');
    }

    function deleteLastColumn() {
      if (subHeaderRowA.length <= MIN_DATA_COLUMNS) {
        setStatus('At least one column pair must remain in the table.', 'error');
        return;
      }

      const removedHeaderLeft = subHeaderRowA[subHeaderRowA.length - 2] || `Column ${subHeaderRowA.length - 1}`;
      const removedHeaderRight = subHeaderRowA[subHeaderRowA.length - 1] || `Column ${subHeaderRowA.length}`;
      subHeaderRowA.pop();
      subHeaderRowA.pop();
      subHeaderRowB.pop();
      subHeaderRowB.pop();
      matrixData = matrixData.map((row) => row.slice(0, subHeaderRowA.length));
      renderTable();
      setStatus(`Column pair "${removedHeaderLeft}" and "${removedHeaderRight}" has been deleted.`, 'success');
    }

    function applyConstraintsToCell(cell, options = { fromPaste: false }) {
      if (!cell || !cell.matches('.editable[contenteditable="true"]')) {
        return;
      }

      const rawValue = cell.textContent;
      const normalized = normalizeCellText(cell, rawValue);
      if (rawValue !== normalized.value) {
        setCellText(cell, normalized.value);
      }

      if (normalized.wasTruncated || normalized.hadLineBreaks || options.fromPaste) {
        if (normalized.wasTruncated && normalized.hadLineBreaks) {
          setStatus('Newlines removed and input truncated to 30 characters.', 'warn');
        } else if (normalized.wasTruncated) {
          setStatus('Input truncated to 30 characters.', 'warn');
        } else if (normalized.hadLineBreaks) {
          setStatus('Newlines removed before saving.', 'warn');
        }
      }
    }

    function wireEvents() {
      tableTitleBandText.addEventListener('keydown', (event) => {
        const cell = event.target.closest('.editable[contenteditable="true"]');
        if (!cell) return;
        if (event.key === 'Enter') {
          event.preventDefault();
          cell.blur();
        }
      });

      tableHead.addEventListener('keydown', (event) => {
        const cell = event.target.closest('.editable[contenteditable="true"]');
        if (!cell) return;
        if (event.key === 'Enter') {
          event.preventDefault();
          cell.blur();
        }
      });

      tableBody.addEventListener('keydown', (event) => {
        const cell = event.target.closest('.editable[contenteditable="true"]');
        if (!cell) return;
        if (event.key === 'Enter') {
          event.preventDefault();
          cell.blur();
        }
      });

      const onEditableInput = (event) => {
        const cell = event.target.closest('.editable[contenteditable="true"]');
        if (!cell) return;
        applyConstraintsToCell(cell);
      };

      const onEditablePaste = (event) => {
        const cell = event.target.closest('.editable[contenteditable="true"]');
        if (!cell) return;
        event.preventDefault();
        const pasted = event.clipboardData?.getData('text') ?? '';
        const normalized = normalizeCellText(cell, pasted);
        setCellText(cell, normalized.value);
        applyConstraintsToCell(cell, { fromPaste: true });
      };

      tableTitleBandText.addEventListener('input', onEditableInput);
      tableHead.addEventListener('input', onEditableInput);
      tableBody.addEventListener('input', onEditableInput);
      tableTitleBandText.addEventListener('paste', onEditablePaste);
      tableHead.addEventListener('paste', onEditablePaste);
      tableBody.addEventListener('paste', onEditablePaste);

      tableTitleBandText.addEventListener('blur', (event) => {
        const cell = event.target.closest('.editable[contenteditable="true"]');
        if (!cell) return;
        applyConstraintsToCell(cell);
        commitHeadCell(cell);
      }, true);

      tableHead.addEventListener('blur', (event) => {
        const cell = event.target.closest('.editable[contenteditable="true"]');
        if (!cell) return;
        applyConstraintsToCell(cell);
        commitHeadCell(cell);
      }, true);

      tableBody.addEventListener('blur', (event) => {
        const dataCell = event.target.closest('.data-cell[contenteditable="true"]');
        if (dataCell) {
          applyConstraintsToCell(dataCell);
          commitDataCell(dataCell);
        }
      }, true);

      tableBody.addEventListener('click', (event) => {
        const deleteButton = event.target.closest('.row-delete-btn');
        if (!deleteButton) return;

        const rowIndex = Number(deleteButton.dataset.deleteRowIndex);
        showModal({
          title: 'Alert',
          message: 'Are you sure you want to delete this row?',
          confirmText: 'Yes',
          cancelText: 'No',
          onConfirm: () => deleteRow(rowIndex)
        });
      });

      addRowBtn.addEventListener('click', () => {
        showModal({
          title: 'Alert',
          message: 'Are you sure you want to Add a Row?',
          confirmText: 'Yes',
          cancelText: 'No',
          onConfirm: addRow
        });
      });

      addColumnBtn.addEventListener('click', () => {
        showModal({
          title: 'Alert',
          message: 'Are you sure you want to Add a Column Pair?',
          confirmText: 'Yes',
          cancelText: 'No',
          onConfirm: addColumn
        });
      });

      deleteLastColumnBtn.addEventListener('click', () => {
        showModal({
          title: 'Alert',
          message: 'Are you sure you want to delete the last column pair on the right side of the table?',
          confirmText: 'Yes',
          cancelText: 'No',
          onConfirm: deleteLastColumn
        });
      });

      saveFleetBtn.addEventListener('click', () => {
        showModal({
          title: 'Alert',
          message: 'Do you want to save the existing Fleet Distribution?',
          confirmText: 'Yes',
          cancelText: 'No',
          onConfirm: saveFleetToJsonFile
        });
      });

      loadFleetBtn.addEventListener('click', () => {
        showModal({
          title: 'Alert',
          message: 'Do you want to load the previously saved Fleet Distribution?',
          confirmText: 'Yes',
          cancelText: 'No',
          onConfirm: () => {
            fleetFileInput.value = '';
            fleetFileInput.click();
          }
        });
      });

      fleetFileInput.addEventListener('change', () => {
        const selectedFile = fleetFileInput.files?.[0];
        if (!selectedFile) {
          showDefaultFileMissingError();
          return;
        }
        loadFleetFromSelectedFile(selectedFile);
      });

      tableViewport.addEventListener('scroll', syncScrollControls);

      horizontalScroll.addEventListener('input', (event) => {
        tableViewport.scrollLeft = Number(event.target.value);
      });

      scrollLeftBtn.addEventListener('click', () => {
        tableViewport.scrollBy({ left: -180, behavior: 'smooth' });
      });

      scrollRightBtn.addEventListener('click', () => {
        tableViewport.scrollBy({ left: 180, behavior: 'smooth' });
      });

      function toggleMoreActions() {
        moreActionsDropdown.classList.toggle('collapsed');
        moreActionsToggle.textContent = moreActionsDropdown.classList.contains('collapsed') ? 'See More' : 'See Less';
      }

      moreActionsToggle.addEventListener('click', toggleMoreActions);

      modifyFleetBtn.addEventListener('click', () => {
        window.location.href = './fleet-composition.html';
      });

      launchProjectBtn.addEventListener('click', () => {
        window.location.href = './dry-docking-project.html';
      });

      editProjectBtn.addEventListener('click', () => {
        window.location.href = './running-dd-project.html';
      });

      document.addEventListener('click', (event) => {
        if (!moreActionsDropdown.contains(event.target) && !moreActionsDropdown.classList.contains('collapsed')) {
          moreActionsDropdown.classList.add('collapsed');
          moreActionsToggle.textContent = 'See More';
        }
      });

      window.addEventListener('resize', syncScrollControls);

      modalConfirmBtn.addEventListener('click', () => {
        const nextAction = continueAction;
        closeModal();
        if (typeof nextAction === 'function') {
          nextAction();
        }
      });

      modalCancelBtn.addEventListener('click', () => {
        closeModal(true);
      });

      modalOverlay.addEventListener('click', (event) => {
        if (event.target === modalOverlay) {
          closeModal(true);
        }
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && !modalOverlay.classList.contains('hidden')) {
          closeModal(true);
        }
      });
    }

    function initFleetRegistration() {
      const state = loadState();
      mainHeader = state.mainHeader;
      subHeaderRowA = state.subHeaderRowA;
      subHeaderRowB = state.subHeaderRowB;
      rowLabels = state.rowLabels;
      matrixData = state.matrixData;

      void restoreFleetFileHandle().then((handle) => {
        if (handle && handle.name === FLEET_FILE_NAME) {
          fleetFileHandle = handle;
        }
      });

      todayBadge.textContent = `Date: ${formatBadgeDate(new Date())}`;
      renderTable();
      wireEvents();
      wireAutoSaveEvents();
      setStatus('Fleet table loaded with paired-column baseline and 3 header rows.', 'success');
    }

    startDockPilotPageGuard({
      supabase,
      landingPage: './DockPilot_landing.html'
    }).then(() => {
      initFleetRegistration();
    }).catch((error) => {
      console.error('DockPilot guard startup failed:', error);
      window.location.href = './DockPilot_landing.html';
    });
  </script>
</body>
</html>
