<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Manager</title>
  <style>
    :root {
      --panel: rgba(11, 24, 45, 0.92);
      --line: rgba(255, 255, 255, 0.1);
      --text: #eef4ff;
      --muted: #a9b7d3;
      --accent: #6bd7ff;
      --accent-2: #72f1cb;
      --ok: #8ef0b1;
      --warn: #ffd28c;
      --blue-text: #163b73;
      --badge-fill: #093046;
      --badge-line: rgba(107, 215, 255, 0.24);
      --action-btn-bg: rgba(107, 215, 255, 0.24);
      --action-btn-text: #163b73;
      --action-btn-line: rgba(107, 215, 255, 0.5);
      --cancel-btn-bg: #ffe7a8;
      --cancel-btn-text: #5d4200;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.36);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(31, 97, 172, 0.42), transparent 28%),
        radial-gradient(circle at bottom right, rgba(12, 143, 152, 0.32), transparent 26%),
        linear-gradient(135deg, #05101d, #08162a 45%, #06101b 100%);
    }

    .manager-shell {
      width: min(1440px, calc(100vw - 32px));
      margin: 16px auto;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .header-panel {
      display: grid;
      gap: 8px;
      padding: 14px 16px;
    }

    .toolbar-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      width: fit-content;
      padding: 5px 10px;
      border-radius: 999px;
      color: var(--accent);
      background: var(--badge-fill);
      border: 1px solid var(--badge-line);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 2.5vw, 2rem);
      line-height: 1.1;
    }

    .muted {
      margin: 0;
      color: var(--muted);
      line-height: 1.35;
      font-size: 0.82rem;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .header-panel button {
      padding: 9px 13px;
      font-size: 0.88rem;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 15px;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #04101d;
    }

    .secondary-btn {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .action-btn {
      background: var(--action-btn-bg);
      color: var(--action-btn-text);
      border: 1px solid var(--action-btn-line);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .cancel-btn {
      background: var(--cancel-btn-bg);
      color: var(--cancel-btn-text);
      border: 1px solid rgba(93, 66, 0, 0.2);
    }

    button[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .status-note {
      margin: 0;
      padding: 7px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      line-height: 1.3;
      font-size: 0.76rem;
    }

    .status-note.success {
      color: var(--ok);
      background: rgba(142, 240, 177, 0.08);
      border-color: rgba(142, 240, 177, 0.18);
    }

    .status-note.error {
      color: var(--warn);
      background: rgba(255, 210, 140, 0.08);
      border-color: rgba(255, 210, 140, 0.18);
    }

    .table-area {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: stretch;
    }

    .matrix-frame {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .matrix-grid {
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr) 150px;
      grid-template-rows: auto minmax(0, 1fr);
      min-width: 0;
      border-radius: 16px;
      overflow: hidden;
      background: #ffffff;
    }

    .corner-wrap,
    .header-wrap,
    .action-head-wrap,
    .label-wrap,
    .body-viewport,
    .action-body-wrap {
      background: #ffffff;
    }

    .corner-wrap {
      grid-column: 1;
      grid-row: 1;
      overflow: hidden;
    }

    .header-wrap {
      grid-column: 2;
      grid-row: 1;
      overflow: hidden;
      scrollbar-width: none;
    }

    .action-head-wrap {
      grid-column: 3;
      grid-row: 1;
      overflow: hidden;
      background: var(--panel);
    }

    .label-wrap {
      grid-column: 1;
      grid-row: 2;
      overflow: hidden;
      max-height: 62vh;
      padding-bottom: 150px;
      scrollbar-width: none;
    }

    .body-viewport {
      grid-column: 2;
      grid-row: 2;
      overflow: auto;
      max-height: 62vh;
      padding-bottom: 150px;
      scrollbar-width: none;
    }

    .action-body-wrap {
      grid-column: 3;
      grid-row: 2;
      overflow: hidden;
      max-height: 62vh;
      padding-bottom: 150px;
      background: var(--panel);
      scrollbar-width: none;
    }

    .header-wrap::-webkit-scrollbar,
    .label-wrap::-webkit-scrollbar,
    .body-viewport::-webkit-scrollbar,
    .action-body-wrap::-webkit-scrollbar {
      display: none;
    }

    .corner-wrap table,
    .header-wrap table,
    .action-head-wrap table,
    .label-wrap table,
    .body-viewport table,
    .action-body-wrap table {
      border-collapse: separate;
      border-spacing: 0;
      background: #ffffff;
    }

    .corner-wrap table,
    .label-wrap table {
      width: 250px;
      min-width: 250px;
    }

    .action-head-wrap table,
    .action-body-wrap table {
      width: 150px;
      min-width: 150px;
      background: var(--panel);
    }

    .header-wrap table,
    .body-viewport table {
      width: max-content;
      min-width: 100%;
    }

    th,
    td {
      padding: 5px 10px;
      border-right: 1px dashed #1a243a;
      border-bottom: 1px dashed #1a243a;
      font-size: 0.94rem;
      min-width: 130px;
      height: 25px;
    }

    .corner-wrap th,
    .label-wrap th {
      width: 250px;
      min-width: 250px;
      background: var(--badge-fill);
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 700;
      text-align: left;
    }

    .header-wrap th {
      width: 130px;
      min-width: 130px;
      background: var(--badge-fill);
      color: #6bd7ff;
      text-transform: none;
      letter-spacing: normal;
      font-size: 0.94rem;
      font-weight: 700;
      text-align: center;
    }

    .body-viewport td {
      width: 130px;
      min-width: 130px;
      color: var(--blue-text);
      background: #ffffff;
      font-weight: 600;
      vertical-align: middle;
      text-align: center;
    }

    .action-header,
    .row-action-cell {
      width: 150px !important;
      min-width: 150px !important;
      background: var(--panel) !important;
      text-align: center;
      color: var(--text);
    }

    .action-head-wrap th,
    .action-body-wrap td {
      width: 150px;
      min-width: 150px;
      background: var(--panel);
      color: var(--text);
      text-align: center;
    }

    .row-label {
      vertical-align: top;
    }

    .row-label.is-item {
      padding-left: calc(10px + 4ch);
    }

    .row-label.is-section {
      color: #ffffff;
    }

    .row-label-text {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      line-clamp: 4;
      -webkit-line-clamp: 4;
      overflow: hidden;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      line-height: 1.25;
      min-height: 1.25em;
    }

    .cell-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: calc(1em + 3px);
      padding: 1px 6px;
      border-radius: 8px;
    }

    .data-cell.is-editable,
    .header-cell.is-editable,
    .row-label.is-editable {
      cursor: text;
    }

    .data-cell.is-editable:focus,
    .header-cell.is-editable:focus,
    .row-label.is-editable:focus {
      outline: 2px solid rgba(107, 215, 255, 0.85);
      outline-offset: -3px;
    }

    .cell-chip.is-expired {
      border: 1.5px dashed #db4b4b;
      color: #c62828;
      font-weight: 700;
    }

    .cell-chip.is-soon {
      border: 1.5px dotted #e89a34;
      color: #8a5a13;
      background: rgba(255, 236, 120, 0.55);
    }

    .horizontal-scroll-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    .vertical-scroll-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      align-self: stretch;
      min-height: 62vh;
      padding: 2px 0;
    }

    .scroll-arrow {
      width: 40px;
      padding: 8px 0;
    }

    .scroll-range {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
    }

    .horizontal-range {
      flex: 1;
      min-width: 25mm;
      height: 18px;
    }

    .vertical-range {
      appearance: slider-vertical;
      -webkit-appearance: slider-vertical;
      writing-mode: bt-lr;
      width: 18px;
      flex: 1;
      height: 100%;
      min-height: 180px;
      background: transparent;
    }

    .scroll-range::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
    }

    .vertical-range::-webkit-slider-runnable-track {
      width: 6px;
      height: 100%;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
    }

    .scroll-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      border-radius: 999px;
      border: 1px solid rgba(7, 17, 31, 0.18);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      cursor: pointer;
      margin-top: -5px;
    }

    .horizontal-range::-webkit-slider-thumb {
      width: var(--thumb-width, 96px);
      height: 16px;
    }

    .vertical-range::-webkit-slider-thumb {
      width: 16px;
      height: var(--thumb-height, 40px);
      margin-top: 0;
    }

    .scroll-range::-moz-range-track {
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
    }

    .scroll-range::-moz-range-thumb {
      border: 1px solid rgba(7, 17, 31, 0.18);
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      cursor: pointer;
    }

    .horizontal-range::-moz-range-thumb {
      width: var(--thumb-width, 96px);
      height: 16px;
    }

    .vertical-range::-moz-range-thumb {
      width: 16px;
      height: var(--thumb-height, 40px);
    }

    .table-footer-actions {
      display: flex;
      justify-content: flex-start;
      margin-top: 0;
      padding-top: 0;
      background: transparent;
    }

    .hidden {
      display: none !important;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(3, 9, 18, 0.72);
      z-index: 1000;
      padding: 16px;
    }

    .modal-card {
      width: min(420px, 100%);
      background: #ffffff;
      color: #0f2244;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
    }

    .modal-card h2 {
      margin: 0 0 10px;
      font-size: 1.2rem;
    }

    .modal-card p {
      margin: 0;
      line-height: 1.5;
      color: #27436d;
      font-size: 0.95rem;
    }

    .modal-hint {
      margin-top: 10px;
      color: #35598a;
      font-size: 0.84rem;
    }

    .modal-editor {
      width: 100%;
      min-height: 280px;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid rgba(15, 34, 68, 0.18);
      border-radius: 12px;
      resize: vertical;
      font: 0.88rem/1.45 Menlo, Monaco, Consolas, monospace;
      color: #0f2244;
      background: #f8fbff;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 5px;
      margin-top: 16px;
    }

    @media (max-width: 900px) {
      .manager-shell {
        width: min(100vw - 20px, 100%);
      }

      .toolbar-row {
        align-items: flex-start;
      }

      .top-actions {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <main class="manager-shell">
    <section class="panel header-panel">
      <div class="toolbar-row">
        <span id="todayBadge" class="tag">Date:</span>

        <div class="top-actions">
          <button id="eventLogBtn" type="button" class="secondary-btn">Event Log</button>
          <button id="returnBaseBtn" type="button" class="secondary-btn">Return to Base</button>
          <button id="loadBtn" type="button" class="secondary-btn">Load</button>
          <button id="saveBtn" type="button" class="secondary-btn">Save</button>
          <button id="dmtBtn" type="button" class="secondary-btn">DMT</button>
          <input id="loadFileInput" type="file" accept=".json,application/json" hidden />
          <input id="csvFileInput" type="file" accept=".csv,text/csv" hidden />
          <button id="importVesselBtn" type="button" class="primary-btn">Import Vessel</button>
        </div>
      </div>

      <div>
        <h1>Certificate Manager</h1>
        <p class="muted">Import a vessel CSV file to populate the matching vessel column with certificate due dates using the saved DMT.</p>
      </div>
    </section>

    <p id="statusNote" class="status-note">Choose a `.csv` file to import certificate due dates into the table below using the saved DMT.</p>

    <section class="panel">
      <div class="table-area">
        <div class="matrix-frame">
          <div class="matrix-grid">
            <div class="corner-wrap">
              <table>
                <thead id="cornerHead"></thead>
              </table>
            </div>

            <div id="headerWrap" class="header-wrap">
              <table>
                <thead id="tableHead"></thead>
              </table>
            </div>

            <div class="action-head-wrap">
              <table>
                <thead id="actionHead"></thead>
              </table>
            </div>

            <div id="labelWrap" class="label-wrap">
              <table>
                <tbody id="labelBody"></tbody>
              </table>
            </div>

            <div id="tableWrap" class="body-viewport">
              <table>
                <tbody id="tableBody"></tbody>
              </table>
            </div>

            <div id="actionBodyWrap" class="action-body-wrap">
              <table>
                <tbody id="actionBody"></tbody>
              </table>
            </div>
          </div>

          <div class="table-footer-actions">
            <button id="addRowBtn" type="button" class="secondary-btn">Add Row</button>
          </div>
        </div>

        <div class="vertical-scroll-controls">
          <button id="scrollUpBtn" type="button" class="secondary-btn scroll-arrow">▲</button>
          <input id="verticalScroll" class="scroll-range vertical-range" type="range" min="0" max="0" value="0" step="1" />
          <button id="scrollDownBtn" type="button" class="secondary-btn scroll-arrow">▼</button>
        </div>
      </div>

      <div class="horizontal-scroll-controls">
        <button id="scrollLeftBtn" type="button" class="secondary-btn scroll-arrow">◀</button>
        <input id="horizontalScroll" class="scroll-range horizontal-range" type="range" min="0" max="0" value="0" step="1" />
        <button id="scrollRightBtn" type="button" class="secondary-btn scroll-arrow">▶</button>
      </div>

    </section>
  </main>

  <div id="modalOverlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <h2 id="modalTitle">Note</h2>
      <p id="modalMessage"></p>
      <p id="modalHint" class="modal-hint hidden"></p>
      <textarea id="modalEditor" class="modal-editor hidden" spellcheck="false"></textarea>
      <div class="modal-actions">
        <button id="modalCancelBtn" type="button" class="secondary-btn cancel-btn hidden">No</button>
        <button id="modalConfirmBtn" type="button" class="primary-btn">Continue</button>
      </div>
    </div>
  </div>

  <script>

    const currentRole = currentSession?.role || 'User';
    const canEditCells = ['Frontend Developer', 'Backend Developer', 'Project Admin'].includes(currentRole);
    const canViewEventLog = ['Frontend Developer', 'Backend Developer', 'QA Tester'].includes(currentRole);
    const canManageDmt = ['Frontend Developer', 'Backend Developer', 'Project Admin'].includes(currentRole);
    const MANUAL_EDIT_PAUSE_MS = 700;

    let { certificateHeader, vesselHeaders, certLabels, matrixData } = loadState();
    let dmtMapping = loadDmt();
    let eventLogEntries = loadEventLog();
    const didClearStoredDueDates = clearStoredDueDatesOnce();
    const warnedDueDateCells = new Set();
    let continueAction = null;
    let cancelAction = null;
    let editPauseUntil = 0;
    let lastEditedCellKey = '';

    function getSession() {
      try {
        return JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
      } catch {
        return null;
      }
    }

    function mmToPx(mm) {
      return Math.round(mm * 3.78);
    }

    function setStatus(text, tone = '') {
      statusNote.textContent = text;
      statusNote.className = `status-note${tone ? ` ${tone}` : ''}`;
    }

    function getEditableCellKey(cell) {
      if (!cell?.dataset) {
        return '';
      }

      if (cell.dataset.cellId) {
        return cell.dataset.cellId;
      }

      if (cell.dataset.headerType === 'corner') {
        return makeCellId(1, 1);
      }

      if (cell.dataset.headerType === 'vessel') {
        return makeCellId(1, Number(cell.dataset.colIndex) + 2);
      }

      if (typeof cell.dataset.rowLabelIndex !== 'undefined') {
        return makeCellId(Number(cell.dataset.rowLabelIndex) + 2, 1);
      }

      return '';
    }

    function startEditPause(cellKey) {
      editPauseUntil = Date.now() + MANUAL_EDIT_PAUSE_MS;
      lastEditedCellKey = cellKey;
    }

    function isEditPauseActiveForCell(cell) {
      const cellKey = getEditableCellKey(cell);
      return Boolean(cellKey) && Date.now() < editPauseUntil && cellKey !== lastEditedCellKey;
    }

    function handleEditPauseAttempt(cell) {
      if (!isEditPauseActiveForCell(cell)) {
        return false;
      }

      setStatus('Please wait a moment before editing a different cell.', 'error');
      setTimeout(() => cell.blur(), 0);
      return true;
    }

    function isDuplicateVesselName(nextValue, currentColIndex) {
      const normalizedValue = normalizeName(nextValue);
      const normalizedKey = normalizeVesselKey(nextValue);

      if (!normalizedValue || normalizedValue === 'vessel name' || !normalizedKey) {
        return false;
      }

      return vesselHeaders.some((header, index) => (
        index !== currentColIndex && normalizeVesselKey(header) === normalizedKey
      ));
    }

    function showDueDateFormatAlert(cellId) {
      if (!cellId || warnedDueDateCells.has(cellId)) {
        return;
      }

      warnedDueDateCells.add(cellId);
      showModal({
        title: 'Alert',
        message: 'You are editing a Due-date. Format should be dd/mm/yyyy',
        confirmText: 'Continue'
      });
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function normalizeName(value) {
      return String(value ?? '').trim().toLowerCase().replace(/\s+/g, ' ');
    }

    function normalizeVesselKey(value) {
      return normalizeName(value).replace(/[^a-z0-9]/g, '');
    }

    function findVesselColumn(vesselName) {
      const normalizedTarget = normalizeName(vesselName);
      const targetKey = normalizeVesselKey(vesselName);

      const exactIndex = vesselHeaders.findIndex((header) => {
        const normalizedHeader = normalizeName(header);
        const headerKey = normalizeVesselKey(header);
        return normalizedHeader === normalizedTarget || (targetKey && headerKey === targetKey);
      });

      if (exactIndex !== -1) {
        return exactIndex;
      }

      const partialMatches = vesselHeaders
        .map((header, index) => ({
          index,
          headerKey: normalizeVesselKey(header)
        }))
        .filter(({ headerKey }) => targetKey && headerKey && (headerKey.includes(targetKey) || targetKey.includes(headerKey)));

      return partialMatches.length === 1 ? partialMatches[0].index : -1;
    }

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function formatBadgeDate(date) {
      const day = String(date.getDate()).padStart(2, '0');
      return `${day}-${monthNames[date.getMonth()]}-${date.getFullYear()}`;
    }

    function formatFileDate(date) {
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      return `${day}${month}${date.getFullYear()}`;
    }

    function formatTimestamp(date) {
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const seconds = String(date.getSeconds()).padStart(2, '0');
      return `${formatBadgeDate(date)} ${hours}:${minutes}:${seconds}`;
    }

    function formatDateObject(date) {
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const year = date.getFullYear();
      return `${day}/${month}/${year}`;
    }

    function parseDisplayDate(value) {
      const raw = String(value ?? '').trim();
      if (!raw) return null;

      if (/^\d{2}\/\d{2}\/\d{4}$/.test(raw)) {
        const [day, month, year] = raw.split('/').map(Number);
        const date = new Date(year, month - 1, day);
        if (date.getFullYear() === year && date.getMonth() === month - 1 && date.getDate() === day) {
          return startOfDay(date);
        }
      }

      const parsed = new Date(raw);
      if (!Number.isNaN(parsed.getTime())) {
        return startOfDay(parsed);
      }

      return null;
    }

    function getDateState(value) {
      const parsed = parseDisplayDate(value);
      if (!parsed) return '';

      const today = startOfDay(new Date());
      const diffDays = Math.round((parsed.getTime() - today.getTime()) / 86400000);
      if (diffDays < 0) return 'is-expired';
      if (diffDays <= 30) return 'is-soon';
      return '';
    }

    function formatDateValue(value) {
      const raw = String(value ?? '').trim();
      if (!raw) return '';

      if (/^\d{2}\/\d{2}\/\d{4}$/.test(raw)) {
        return raw;
      }

      if (/^\d+(\.\d+)?$/.test(raw)) {
        const serial = Number(raw);
        if (serial > 20000) {
          const excelEpoch = new Date(Date.UTC(1899, 11, 30));
          excelEpoch.setUTCDate(excelEpoch.getUTCDate() + Math.floor(serial));
          return formatDateObject(excelEpoch);
        }
      }

      const parsed = new Date(raw);
      if (!Number.isNaN(parsed.getTime())) {
        return formatDateObject(parsed);
      }

      const parts = raw.split(/[.\/-]/);
      if (parts.length === 3) {
        const [first, second, third] = parts.map((part) => Number(part));
        if ([first, second, third].every((part) => Number.isFinite(part))) {
          const year = third < 100 ? 2000 + third : third;
          const date = new Date(year, second - 1, first);
          if (!Number.isNaN(date.getTime())) {
            return formatDateObject(date);
          }
        }
      }

      return raw;
    }

    function makeDefaultMatrix(rowLabels = DEFAULT_CERT_LABELS, headers = DEFAULT_VESSEL_HEADERS) {
      return rowLabels.map(() => Array(headers.length).fill(''));
    }

    function buildCertLabels(labels = []) {
      const normalizedLabels = Array.isArray(labels)
        ? labels.map((label, index) => String(label ?? '').trim() || `Cert ${index + 1}`)
        : [];

      return [
        ...DEFAULT_CERT_LABELS,
        ...normalizedLabels.slice(DEFAULT_CERT_LABELS.length)
      ];
    }

    function makeLabelKey(value) {
      return String(value ?? '')
        .replace(/^\s+/, '')
        .trim()
        .replace(/:+$/, '')
        .toLowerCase()
        .replace(/\s+/g, ' ');
    }

    function isSectionHeader(value) {
      return [
        'flag issued certificates',
        'insurance issued documents',
        'ro/class issued certificates (some may be issued directly by flag)',
        'audit related documents'
      ].includes(makeLabelKey(value));
    }

    function normalizeState(raw = {}) {
      const rawCertificateHeader = String(raw?.certificateHeader ?? '').trim();
      const nextCertificateHeader = !rawCertificateHeader || rawCertificateHeader === 'Certificate'
        ? DEFAULT_CERTIFICATE_HEADER
        : rawCertificateHeader;
      const nextHeaders = Array.isArray(raw?.vesselHeaders) && raw.vesselHeaders.length
        ? raw.vesselHeaders.map((header, index) => String(header ?? '').trim() || `Vessel ${index + 1}`)
        : [...DEFAULT_VESSEL_HEADERS];
      const nextLabels = buildCertLabels(raw?.certLabels);
      const sourceLabels = Array.isArray(raw?.certLabels) ? raw.certLabels : [];
      const hasSourceLabels = sourceLabels.length > 0;
      const sourceMatrix = raw?.matrixData ?? raw?.data ?? (Array.isArray(raw) ? raw : []);
      const sourceRowMap = new Map(
        sourceLabels.map((label, index) => [makeLabelKey(label), sourceMatrix?.[index] ?? []])
      );
      const nextMatrix = nextLabels.map((label, rowIndex) => {
        const sourceRow = hasSourceLabels
          ? sourceRowMap.get(makeLabelKey(label)) || []
          : sourceMatrix?.[rowIndex] || [];

        return nextHeaders.map((_, colIndex) => formatDateValue(sourceRow?.[colIndex] ?? ''));
      });

      return {
        certificateHeader: nextCertificateHeader,
        vesselHeaders: nextHeaders,
        certLabels: nextLabels,
        matrixData: nextMatrix
      };
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STATE_KEY) || 'null');
        if (saved) {
          return normalizeState(saved);
        }
      } catch {
        // Ignore malformed saved state
      }

      try {
        const legacy = JSON.parse(localStorage.getItem(LEGACY_MATRIX_KEY) || 'null');
        if (legacy) {
          return normalizeState({ matrixData: legacy });
        }
      } catch {
        // Ignore malformed legacy matrix
      }

      return normalizeState();
    }

    function saveState() {
      matrixData = certLabels.map((_, rowIndex) => (
        vesselHeaders.map((_, colIndex) => formatDateValue(matrixData?.[rowIndex]?.[colIndex] ?? ''))
      ));

      localStorage.setItem(STATE_KEY, JSON.stringify({
        certificateHeader,
        vesselHeaders,
        certLabels,
        matrixData
      }));
    }

    function clearAllDueDateCells() {
      matrixData = certLabels.map(() => Array(vesselHeaders.length).fill(''));
      saveState();
    }

    function clearStoredDueDatesOnce() {
      try {
        if (localStorage.getItem(DUE_DATE_RESET_KEY) === DUE_DATE_RESET_VERSION) {
          return false;
        }

        clearAllDueDateCells();
        localStorage.setItem(DUE_DATE_RESET_KEY, DUE_DATE_RESET_VERSION);
        return true;
      } catch {
        return false;
      }
    }

    function loadEventLog() {
      try {
        const saved = JSON.parse(localStorage.getItem(EVENT_LOG_KEY) || '[]');
        return Array.isArray(saved) ? saved : [];
      } catch {
        return [];
      }
    }

    function saveEventLog() {
      localStorage.setItem(EVENT_LOG_KEY, JSON.stringify(eventLogEntries));
    }

    function normalizeDmt(raw = []) {
      const sourceEntries = Array.isArray(raw) ? raw : [];
      const sourceMap = new Map(
        sourceEntries.map((entry) => [Number(entry?.targetRow), String(entry?.csvCell ?? '').trim().toUpperCase()])
      );

      return DEFAULT_DMT.map((entry) => {
        const savedRef = sourceMap.get(entry.targetRow);
        return {
          targetRow: entry.targetRow,
          csvCell: /^[A-Z]+\d+$/.test(savedRef || '') ? savedRef : entry.csvCell
        };
      });
    }

    function loadDmt() {
      try {
        const saved = JSON.parse(localStorage.getItem(DMT_KEY) || 'null');
        if (saved && !Array.isArray(saved) && saved.version === DMT_VERSION) {
          return normalizeDmt(saved.mapping);
        }
      } catch {
        // Ignore malformed DMT state
      }

      return normalizeDmt(DEFAULT_DMT);
    }

    function saveDmt(mapping = dmtMapping) {
      dmtMapping = normalizeDmt(mapping);
      localStorage.setItem(DMT_KEY, JSON.stringify({ version: DMT_VERSION, mapping: dmtMapping }));
      return dmtMapping;
    }

    function makeDmtText(mapping = dmtMapping) {
      return normalizeDmt(mapping)
        .map((entry) => `R${entry.targetRow}\t${entry.csvCell}`)
        .join('\n');
    }

    function parseDmtText(text) {
      const lines = String(text ?? '')
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);

      const mappingByRow = new Map();
      lines.forEach((line, index) => {
        const match = line.match(/^R(\d+)[,\s\t]+([A-Z]+\d+)$/i);
        if (!match) {
          throw new Error(`Invalid DMT entry on line ${index + 1}. Use the format "R2 D2".`);
        }
        mappingByRow.set(Number(match[1]), match[2].toUpperCase());
      });

      const missingRows = DEFAULT_DMT
        .map((entry) => entry.targetRow)
        .filter((rowNumber) => !mappingByRow.has(rowNumber));

      if (missingRows.length) {
        throw new Error(`Missing DMT rows: ${missingRows.map((rowNumber) => `R${rowNumber}`).join(', ')}`);
      }

      return DEFAULT_DMT.map((entry) => ({
        targetRow: entry.targetRow,
        csvCell: mappingByRow.get(entry.targetRow) || entry.csvCell
      }));
    }

    function cellRefToIndexes(ref) {
      const match = String(ref ?? '').trim().toUpperCase().match(/^([A-Z]+)(\d+)$/);
      if (!match) {
        return null;
      }

      const [, letters, rowText] = match;
      let colIndex = 0;
      for (const char of letters) {
        colIndex = (colIndex * 26) + (char.charCodeAt(0) - 64);
      }

      return {
        rowIndex: Number(rowText) - 1,
        colIndex: colIndex - 1
      };
    }

    function getCsvValueByRef(rows, ref) {
      const indexes = cellRefToIndexes(ref);
      if (!indexes) {
        return '';
      }

      return rows?.[indexes.rowIndex]?.[indexes.colIndex] ?? '';
    }

    function looksLikeCellRef(value) {
      return /^[A-Z]+\d+$/.test(String(value ?? '').trim().toUpperCase());
    }

    function isLikelyDateValue(value) {
      const raw = String(value ?? '').trim();
      if (!raw) return false;
      if (/^NA$/i.test(raw)) return true;
      if (/^\d{2}\/\d{2}\/\d{4}$/.test(raw)) return true;
      if (/^\d{1,2}[-\/.][A-Za-z]{3}[-\/.]\d{2,4}$/.test(raw)) return true;
      if (/^\d{1,2}[-\/.]\d{1,2}[-\/.]\d{2,4}$/.test(raw)) return true;

      const parsed = new Date(raw);
      return !Number.isNaN(parsed.getTime());
    }

    function findNamedColumnIndex(rows, headerNames = []) {
      const targets = headerNames.map((value) => normalizeName(value));
      for (const row of rows.slice(0, 12)) {
        for (let index = 0; index < row.length; index += 1) {
          if (targets.includes(normalizeName(row[index]))) {
            return index;
          }
        }
      }
      return -1;
    }

    function guessDueDateFromRow(row = [], preferredIndex = -1) {
      const candidateIndexes = [];
      if (preferredIndex >= 0 && preferredIndex < row.length) {
        candidateIndexes.push(preferredIndex);
      }
      for (let index = row.length - 1; index >= 0; index -= 1) {
        if (!candidateIndexes.includes(index)) {
          candidateIndexes.push(index);
        }
      }

      for (const index of candidateIndexes) {
        const candidate = String(row[index] ?? '').trim();
        if (isLikelyDateValue(candidate)) {
          return formatDateValue(candidate);
        }
      }

      return '';
    }

    function resolveMappedImportValue(rows, csvCell, dueDateColumnIndex) {
      const directValue = String(getCsvValueByRef(rows, csvCell) ?? '').trim();

      if (looksLikeCellRef(directValue)) {
        const dereferencedValue = String(getCsvValueByRef(rows, directValue) ?? '').trim();
        if (isLikelyDateValue(dereferencedValue)) {
          return formatDateValue(dereferencedValue);
        }

        const dereferencedIndexes = cellRefToIndexes(directValue);
        if (dereferencedIndexes) {
          const guessedValue = guessDueDateFromRow(rows[dereferencedIndexes.rowIndex] || [], dueDateColumnIndex);
          if (guessedValue) {
            return guessedValue;
          }
        }
      }

      if (isLikelyDateValue(directValue)) {
        return formatDateValue(directValue);
      }

      const sourceIndexes = cellRefToIndexes(csvCell);
      if (sourceIndexes) {
        const guessedValue = guessDueDateFromRow(rows[sourceIndexes.rowIndex] || [], dueDateColumnIndex);
        if (guessedValue) {
          return guessedValue;
        }
      }

      return formatDateValue(directValue);
    }

    function extractVesselName(rows, fileName = '') {
      const vesselRef = dmtMapping.find((entry) => entry.targetRow === 1)?.csvCell || 'C2';
      const directName = String(getCsvValueByRef(rows, vesselRef) ?? '').trim();
      if (directName) {
        return directName;
      }

      for (const row of rows.slice(0, 12)) {
        const labelIndex = row.findIndex((cell) => normalizeName(cell) === 'vessel name');
        if (labelIndex !== -1) {
          for (let index = labelIndex + 1; index < row.length; index += 1) {
            const candidate = String(row[index] ?? '').trim();
            if (candidate) {
              return candidate;
            }
          }
        }
      }

      return String(fileName || '')
        .replace(/\.csv$/i, '')
        .replace(/\s+vessel certificates status$/i, '')
        .trim();
    }

    function parseCsv(text) {
      const rows = [];
      let currentRow = [];
      let currentValue = '';
      let inQuotes = false;
      const input = String(text ?? '').replace(/^\uFEFF/, '');

      for (let index = 0; index < input.length; index += 1) {
        const char = input[index];
        const nextChar = input[index + 1];

        if (char === '"') {
          if (inQuotes && nextChar === '"') {
            currentValue += '"';
            index += 1;
          } else {
            inQuotes = !inQuotes;
          }
          continue;
        }

        if (!inQuotes && char === ',') {
          currentRow.push(currentValue);
          currentValue = '';
          continue;
        }

        if (!inQuotes && (char === '\n' || char === '\r')) {
          currentRow.push(currentValue);
          rows.push(currentRow);
          currentRow = [];
          currentValue = '';

          if (char === '\r' && nextChar === '\n') {
            index += 1;
          }
          continue;
        }

        currentValue += char;
      }

      currentRow.push(currentValue);
      rows.push(currentRow);
      return rows;
    }

    function makeCellId(rowNumber, colNumber) {
      return `R${rowNumber}C${colNumber}`;
    }

    function addEventLogEntry(cellId, oldValue, newValue) {
      if (String(oldValue ?? '') === String(newValue ?? '')) {
        return;
      }

      eventLogEntries.push({
        timestamp: new Date().toISOString(),
        role: currentRole,
        cellId,
        oldValue: String(oldValue ?? ''),
        newValue: String(newValue ?? '')
      });
      saveEventLog();
    }

    function makeEventLogText() {
      if (!eventLogEntries.length) {
        return 'EventLog\n\nNo edits have been recorded yet.';
      }

      const lines = eventLogEntries.map((entry) => {
        const stamp = formatTimestamp(new Date(entry.timestamp));
        return `${stamp} | ${entry.role} | ${entry.cellId} | ${entry.oldValue || '(blank)'} | ${entry.newValue || '(blank)'}`;
      });

      return ['EventLog', 'Date / Time | Access Level | Cell ID | Old Value | New Value', ...lines].join('\n');
    }

    function renderTable() {
      const editableAttr = canEditCells ? 'contenteditable="true" spellcheck="false"' : '';
      const editableClass = canEditCells ? 'is-editable' : '';

      cornerHead.innerHTML = `
        <tr>
          <th class="top-left-cell header-cell ${editableClass}" data-header-type="corner" ${editableAttr}>${escapeHtml(certificateHeader)}</th>
        </tr>
      `;

      tableHead.innerHTML = `
        <tr>
          ${vesselHeaders.map((header, colIndex) => `
            <th class="vessel-header header-cell ${editableClass}" data-header-type="vessel" data-col-index="${colIndex}" ${editableAttr}>${escapeHtml(header)}</th>
          `).join('')}
        </tr>
      `;

      actionHead.innerHTML = `
        <tr>
          <th class="action-header"><button id="addColumnBtn" type="button" class="secondary-btn" ${canEditCells ? '' : 'disabled'}>Add Column</button></th>
        </tr>
      `;

      labelBody.innerHTML = certLabels.map((label, rowIndex) => {
        const sectionClass = isSectionHeader(label) ? 'is-section' : 'is-item';
        return `
          <tr>
            <th scope="row" class="row-label ${editableClass} ${sectionClass}" data-row-label-index="${rowIndex}" ${editableAttr}><span class="row-label-text">${escapeHtml(label)}</span></th>
          </tr>
        `;
      }).join('');

      tableBody.innerHTML = certLabels.map((label, rowIndex) => `
        <tr>
          ${vesselHeaders.map((_, colIndex) => {
            const value = matrixData[rowIndex]?.[colIndex] || '';
            const stateClass = getDateState(value);
            return `
              <td class="data-cell ${editableClass}" data-row-index="${rowIndex}" data-col-index="${colIndex}" data-cell-id="${makeCellId(rowIndex + 2, colIndex + 2)}" ${editableAttr}>
                <span class="cell-chip ${stateClass}">${escapeHtml(value)}</span>
              </td>
            `;
          }).join('')}
        </tr>
      `).join('');

      actionBody.innerHTML = certLabels.map((_, rowIndex) => `
        <tr>
          <td class="row-action-cell"><button type="button" class="secondary-btn row-delete-btn" data-delete-row-index="${rowIndex}" ${canEditCells ? '' : 'disabled'}>Delete Row</button></td>
        </tr>
      `).join('');

      saveState();
      requestAnimationFrame(() => {
        syncPaneHeights();
        syncScrollControls();
      });
    }

    function commitDataCell(cell) {
      const rowIndex = Number(cell.dataset.rowIndex);
      const colIndex = Number(cell.dataset.colIndex);
      const cellId = makeCellId(rowIndex + 2, colIndex + 2);
      const oldValue = matrixData[rowIndex]?.[colIndex] ?? '';
      const nextValue = formatDateValue(cell.textContent.trim());

      if (oldValue === nextValue) {
        renderTable();
        return;
      }

      matrixData[rowIndex][colIndex] = nextValue;
      saveState();
      addEventLogEntry(cellId, oldValue, nextValue);
      renderTable();
      startEditPause(cellId);
      setStatus(`Updated ${cellId} from "${oldValue || '(blank)'}" to "${nextValue || '(blank)'}".`, 'success');

      if (nextValue) {
        showDueDateFormatAlert(cellId);
      }
    }

    function commitHeaderCell(cell) {
      const headerType = cell.dataset.headerType;
      const nextValue = cell.textContent.trim() || (headerType === 'corner' ? DEFAULT_CERTIFICATE_HEADER : 'Vessel Name');

      if (headerType === 'corner') {
        const cellId = makeCellId(1, 1);
        const oldValue = certificateHeader;
        if (oldValue === nextValue) {
          renderTable();
          return;
        }
        certificateHeader = nextValue;
        saveState();
        addEventLogEntry(cellId, oldValue, nextValue);
        renderTable();
        startEditPause(cellId);
        setStatus(`Updated ${cellId} from "${oldValue}" to "${nextValue}".`, 'success');
        return;
      }

      const colIndex = Number(cell.dataset.colIndex);
      const cellId = makeCellId(1, colIndex + 2);
      const oldValue = vesselHeaders[colIndex] ?? '';
      if (oldValue === nextValue) {
        renderTable();
        return;
      }

      if (isDuplicateVesselName(nextValue, colIndex)) {
        vesselHeaders[colIndex] = 'Vessel Name';
        saveState();
        addEventLogEntry(cellId, oldValue, 'Vessel Name');
        renderTable();
        startEditPause(cellId);
        setStatus('Duplicate vessel name detected. The edited header has been reset to "Vessel Name".', 'error');
        showModal({
          title: 'Alert',
          message: 'This Vessel Name already exists in a different column - choose a different Vessel Name.',
          confirmText: 'Continue'
        });
        return;
      }

      vesselHeaders[colIndex] = nextValue;
      saveState();
      addEventLogEntry(cellId, oldValue, nextValue);
      renderTable();
      startEditPause(cellId);
      setStatus(`Updated ${cellId} from "${oldValue}" to "${nextValue}".`, 'success');
    }

    function commitRowLabelCell(cell) {
      const rowIndex = Number(cell.dataset.rowLabelIndex);
      const cellId = makeCellId(rowIndex + 2, 1);
      const oldValue = certLabels[rowIndex] ?? '';
      const nextValue = cell.textContent.trim() || DEFAULT_CERT_LABELS[rowIndex] || `Cert ${rowIndex + 1}`;

      if (oldValue === nextValue) {
        renderTable();
        return;
      }

      certLabels[rowIndex] = nextValue;
      saveState();
      addEventLogEntry(cellId, oldValue, nextValue);
      renderTable();
      startEditPause(cellId);
      setStatus(`Updated ${cellId} from "${oldValue}" to "${nextValue}".`, 'success');
    }

    function extractImportValues(rows) {
      const dueDateColumnIndex = findNamedColumnIndex(rows, ['Valid Until', 'Due Date', 'Expiry Date', 'Expiry']);

      return dmtMapping
        .filter((entry) => entry.targetRow >= 2)
        .map((entry) => {
          const rowIndex = entry.targetRow - 2;
          const label = certLabels[rowIndex] || '';
          return {
            rowIndex,
            csvCell: entry.csvCell,
            value: isSectionHeader(label) ? '' : resolveMappedImportValue(rows, entry.csvCell, dueDateColumnIndex)
          };
        })
        .filter((entry) => entry.rowIndex >= 0 && entry.rowIndex < certLabels.length);
    }

    function showModal({
      title,
      message,
      confirmText = 'Continue',
      cancelText = '',
      onConfirm = null,
      onCancel = null,
      showEditor = false,
      editorValue = '',
      editorReadOnly = false,
      hintText = ''
    }) {
      modalTitle.textContent = title;
      modalMessage.textContent = message;
      modalHint.textContent = hintText;
      modalHint.classList.toggle('hidden', !hintText);
      modalEditor.value = editorValue;
      modalEditor.readOnly = editorReadOnly;
      modalEditor.classList.toggle('hidden', !showEditor);
      modalConfirmBtn.textContent = confirmText;
      modalCancelBtn.textContent = cancelText || 'No';
      modalCancelBtn.classList.toggle('hidden', !cancelText);
      continueAction = onConfirm;
      cancelAction = onCancel;
      modalOverlay.classList.remove('hidden');

      if (showEditor) {
        modalEditor.focus();
        modalEditor.setSelectionRange(0, modalEditor.value.length);
      } else {
        modalConfirmBtn.focus();
      }
    }

    function closeModal(runCancel = false) {
      const pendingCancel = cancelAction;
      modalOverlay.classList.add('hidden');
      modalHint.textContent = '';
      modalHint.classList.add('hidden');
      modalEditor.value = '';
      modalEditor.readOnly = false;
      modalEditor.classList.add('hidden');
      continueAction = null;
      cancelAction = null;
      if (runCancel && typeof pendingCancel === 'function') {
        pendingCancel();
      }
    }

    function saveJsonFile() {
      const filename = `CertStatus${formatFileDate(new Date())}.json`;
      const payload = {
        savedAt: new Date().toISOString(),
        certificateHeader,
        vesselHeaders,
        certLabels,
        matrixData,
        eventLogEntries,
        dmtMapping
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);

      showModal({
        title: 'Data Saved',
        message: `Data saved in file ${filename}`,
        confirmText: 'Continue'
      });
    }

    function applyLoadedState(parsed) {
      const nextState = normalizeState(parsed);
      certificateHeader = nextState.certificateHeader;
      vesselHeaders = [...nextState.vesselHeaders];
      certLabels = [...nextState.certLabels];
      matrixData = nextState.matrixData.map((row) => [...row]);
      if (Array.isArray(parsed?.dmtMapping) && canManageDmt) {
        saveDmt(parsed.dmtMapping);
      }
      saveState();
      renderTable();
    }

    function addRow() {
      certLabels.push(`Cert ${certLabels.length + 1}`);
      matrixData.push(Array(vesselHeaders.length).fill(''));
      saveState();
      renderTable();
      setStatus('A new certificate row has been added.', 'success');
    }

    function deleteRow(rowIndex) {
      const removedLabel = certLabels[rowIndex] || `Row ${rowIndex + 1}`;
      certLabels.splice(rowIndex, 1);
      matrixData.splice(rowIndex, 1);
      saveState();
      addEventLogEntry(makeCellId(rowIndex + 2, 1), removedLabel, '[row deleted]');
      renderTable();
      setStatus(`${removedLabel} has been deleted.`, 'success');
    }

    function addColumn() {
      vesselHeaders.push('Vessel Name');
      matrixData = matrixData.map((row) => [...row, '']);
      saveState();
      addEventLogEntry(makeCellId(1, vesselHeaders.length + 1), '', 'Vessel Name');
      renderTable();
      setStatus('A new vessel column has been added.', 'success');
    }

    function makeStepSizes() {
      const sampleCell = tableBody.querySelector('.data-cell');
      const sampleRow = tableBody.querySelector('tr');
      return {
        horizontal: Math.max(20, Math.round((sampleCell?.getBoundingClientRect().width || 120) / 4)),
        vertical: Math.max(18, Math.round((sampleRow?.getBoundingClientRect().height || 42) / 2))
      };
    }

    function syncPaneHeights() {
      const cornerRow = cornerHead.querySelector('tr');
      const headerRow = tableHead.querySelector('tr');
      const actionHeaderRow = actionHead.querySelector('tr');
      const labelRows = Array.from(labelBody.querySelectorAll('tr'));
      const bodyRows = Array.from(tableBody.querySelectorAll('tr'));
      const actionRows = Array.from(actionBody.querySelectorAll('tr'));

      if (cornerRow && headerRow && actionHeaderRow) {
        cornerRow.style.height = 'auto';
        headerRow.style.height = 'auto';
        actionHeaderRow.style.height = 'auto';
        const headerHeight = Math.max(
          cornerRow.getBoundingClientRect().height,
          headerRow.getBoundingClientRect().height,
          actionHeaderRow.getBoundingClientRect().height
        );
        cornerRow.style.height = `${headerHeight}px`;
        headerRow.style.height = `${headerHeight}px`;
        actionHeaderRow.style.height = `${headerHeight}px`;
      }

      labelRows.forEach((row) => {
        row.style.height = 'auto';
      });
      bodyRows.forEach((row) => {
        row.style.height = 'auto';
      });
      actionRows.forEach((row) => {
        row.style.height = 'auto';
      });

      bodyRows.forEach((bodyRow, index) => {
        const labelRow = labelRows[index];
        const actionRow = actionRows[index];
        if (!labelRow || !actionRow) {
          return;
        }
        const syncedHeight = Math.max(
          labelRow.getBoundingClientRect().height,
          bodyRow.getBoundingClientRect().height,
          actionRow.getBoundingClientRect().height
        );
        labelRow.style.height = `${syncedHeight}px`;
        bodyRow.style.height = `${syncedHeight}px`;
        actionRow.style.height = `${syncedHeight}px`;
      });
    }

    function syncScrollControls() {
      headerWrap.scrollLeft = tableWrap.scrollLeft;
      labelWrap.scrollTop = tableWrap.scrollTop;
      actionBodyWrap.scrollTop = tableWrap.scrollTop;

      const maxX = Math.max(0, tableWrap.scrollWidth - tableWrap.clientWidth);
      const maxY = Math.max(0, tableWrap.scrollHeight - tableWrap.clientHeight);

      horizontalScroll.max = String(maxX);
      horizontalScroll.value = String(Math.min(maxX, Math.round(tableWrap.scrollLeft)));
      verticalScroll.max = String(maxY);
      verticalScroll.value = String(Math.min(maxY, Math.round(tableWrap.scrollTop)));

      const horizontalThumb = Math.max(mmToPx(25), Math.round((horizontalScroll.clientWidth || 320) * (maxX ? tableWrap.clientWidth / tableWrap.scrollWidth : 1)));
      const verticalControlHeight = verticalScroll.clientHeight || 180;
      const verticalThumb = Math.max(
        Math.round(verticalControlHeight * 0.1),
        Math.min(verticalControlHeight, Math.round(verticalControlHeight * (maxY ? tableWrap.clientHeight / tableWrap.scrollHeight : 1)))
      );

      horizontalScroll.style.setProperty('--thumb-width', `${horizontalThumb}px`);
      verticalScroll.style.setProperty('--thumb-height', `${verticalThumb}px`);

      const disableHorizontal = maxX === 0;
      const disableVertical = maxY === 0;
      horizontalScroll.disabled = disableHorizontal;
      scrollLeftBtn.disabled = disableHorizontal;
      scrollRightBtn.disabled = disableHorizontal;
      verticalScroll.disabled = disableVertical;
      scrollUpBtn.disabled = disableVertical;
      scrollDownBtn.disabled = disableVertical;
    }

    function ensureSessionNotice() {
      todayBadge.textContent = `Date: ${formatBadgeDate(new Date())}`;
      eventLogBtn.disabled = !canViewEventLog;
      eventLogBtn.title = canViewEventLog ? 'Open the EventLog in a new tab.' : 'Event Log is available only to Developer or QA Tester access levels.';
      addRowBtn.disabled = !canEditCells;

      if (!currentSession) {
        setStatus('No active login session found. The grid is available in read-only mode until launched from the landing page.', 'error');
        return;
      }

      const editMessage = canEditCells
        ? 'Live editing of certificate due dates is enabled for this access level.'
        : 'This access level is view-only for the certificate due dates.';
      const resetMessage = didClearStoredDueDates ? ' Previous due date data has been cleared.' : '';
      dmtBtn.title = canManageDmt
        ? 'View or update the saved DMT used for CSV imports.'
        : 'The saved DMT is view-only for this access level.';
      setStatus(`Logged in as ${currentSession.fullName || currentSession.loginName} (${currentRole}). ${editMessage} CSV imports use the saved DMT mapping.${resetMessage}`, 'success');
    }

    tableHead.addEventListener('keydown', (event) => {
      const cell = event.target.closest('.header-cell[contenteditable="true"]');
      if (!cell) return;
      if (event.key === 'Enter') {
        event.preventDefault();
        cell.blur();
      }
    });

    tableHead.addEventListener('blur', (event) => {
      const cell = event.target.closest('.header-cell[contenteditable="true"]');
      if (!cell) return;
      commitHeaderCell(cell);
    }, true);

    labelBody.addEventListener('keydown', (event) => {
      const cell = event.target.closest('.row-label[contenteditable="true"]');
      if (!cell) return;
      if (event.key === 'Enter') {
        event.preventDefault();
        cell.blur();
      }
    });

    labelBody.addEventListener('blur', (event) => {
      const rowLabel = event.target.closest('.row-label[contenteditable="true"]');
      if (rowLabel) {
        commitRowLabelCell(rowLabel);
      }
    }, true);

    tableBody.addEventListener('keydown', (event) => {
      const cell = event.target.closest('.data-cell[contenteditable="true"]');
      if (!cell) return;
      if (event.key === 'Enter') {
        event.preventDefault();
        cell.blur();
      }
    });

    tableBody.addEventListener('blur', (event) => {
      const dataCell = event.target.closest('.data-cell[contenteditable="true"]');
      if (dataCell) {
        commitDataCell(dataCell);
      }
    }, true);

    actionHead.addEventListener('click', (event) => {
      if (event.target.id === 'addColumnBtn' && canEditCells) {
        showModal({
          title: 'Alert',
          message: 'Are you sure you want to Add a Column?',
          confirmText: 'Yes',
          cancelText: 'No',
          onConfirm: addColumn
        });
      }
    });

    actionBody.addEventListener('click', (event) => {
      const deleteButton = event.target.closest('.row-delete-btn');
      if (!deleteButton || !canEditCells) {
        return;
      }

      const rowIndex = Number(deleteButton.dataset.deleteRowIndex);
      showModal({
        title: 'Alert',
        message: 'Are you sure you want to delete this row?',
        confirmText: 'Yes',
        cancelText: 'No',
        onConfirm: () => deleteRow(rowIndex)
      });
    });

    modalConfirmBtn.addEventListener('click', () => {
      const nextAction = continueAction;
      const editorValue = modalEditor.value;
      closeModal();
      if (typeof nextAction === 'function') {
        nextAction(editorValue);
      }
    });

    modalCancelBtn.addEventListener('click', () => {
      closeModal(true);
    });

    modalOverlay.addEventListener('click', (event) => {
      if (event.target === modalOverlay) {
        closeModal(true);
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && !modalOverlay.classList.contains('hidden')) {
        closeModal(true);
      }
    });

    document.addEventListener('focusin', (event) => {
      const editableCell = event.target.closest('.data-cell[contenteditable="true"], .header-cell[contenteditable="true"], .row-label[contenteditable="true"]');
      if (!editableCell) {
        return;
      }

      handleEditPauseAttempt(editableCell);
    }, true);

    document.addEventListener('beforeinput', (event) => {
      const editableCell = event.target.closest?.('.data-cell[contenteditable="true"], .header-cell[contenteditable="true"], .row-label[contenteditable="true"]');
      if (!editableCell) {
        return;
      }

      if (handleEditPauseAttempt(editableCell)) {
        event.preventDefault();
      }
    }, true);

    returnBaseBtn.addEventListener('click', () => {
      window.location.href = './CertMan_landing.html';
    });

    saveBtn.addEventListener('click', () => {
      saveJsonFile();
    });

    dmtBtn.addEventListener('click', () => {
      showModal({
        title: 'DMT — Data Matching Table',
        message: canManageDmt
          ? 'Edit the saved row-to-cell mapping used for every CSV import. Use one line per entry, for example "R2 D2".'
          : 'This saved row-to-cell mapping is view-only for your current access level.',
        confirmText: canManageDmt ? 'Save DMT' : 'Close',
        cancelText: canManageDmt ? 'Cancel' : '',
        showEditor: true,
        editorValue: makeDmtText(),
        editorReadOnly: !canManageDmt,
        hintText: canManageDmt
          ? 'Developer-level access is required to change the DMT.'
          : 'Only Developer-level access can change the DMT.',
        onConfirm: canManageDmt
          ? (editorValue) => {
            try {
              saveDmt(parseDmtText(editorValue));
              setStatus('DMT saved. All future CSV imports will use the updated Data Matching Table.', 'success');
            } catch (error) {
              setStatus(error.message || 'Unable to save the DMT.', 'error');
            }
          }
          : null
      });
    });

    loadBtn.addEventListener('click', () => {
      showModal({
        title: 'Note',
        message: 'Load files which start with name "CertStatus" and correct file type only.',
        confirmText: 'Continue',
        onConfirm: () => loadFileInput.click()
      });
    });

    addRowBtn.addEventListener('click', () => {
      if (!canEditCells) {
        return;
      }

      showModal({
        title: 'Alert',
        message: 'Are you sure you want to Add a Row?',
        confirmText: 'Yes',
        cancelText: 'No',
        onConfirm: addRow
      });
    });

    loadFileInput.addEventListener('change', async (event) => {
      const file = event.target.files?.[0];
      if (!file) {
        return;
      }

      if (!file.name.startsWith('CertStatus') || !file.name.toLowerCase().endsWith('.json')) {
        setStatus('Please load only files that start with "CertStatus" and use the .json file type.', 'error');
        event.target.value = '';
        return;
      }

      try {
        const parsed = JSON.parse(await file.text());
        if (Array.isArray(parsed?.eventLogEntries)) {
          eventLogEntries = parsed.eventLogEntries;
          saveEventLog();
        }
        applyLoadedState(parsed);
        setStatus(`Loaded ${file.name} into the certificate array.`, 'success');
      } catch {
        setStatus('Unable to load the selected data file.', 'error');
      }

      event.target.value = '';
    });

    eventLogBtn.addEventListener('click', () => {
      if (!canViewEventLog) {
        return;
      }

      const logWindow = window.open('', '_blank', 'noopener');
      if (!logWindow) {
        setStatus('Please allow pop-ups to view the EventLog.', 'error');
        return;
      }

      logWindow.document.write(`<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>EventLog</title><style>body{font-family:Menlo,Monaco,Consolas,monospace;padding:18px;line-height:1.5;background:#fff;color:#10294d;}pre{white-space:pre-wrap;word-break:break-word;margin:0;}</style></head><body><pre>${escapeHtml(makeEventLogText())}</pre></body></html>`);
      logWindow.document.close();
    });

    importVesselBtn.addEventListener('click', () => {
      csvFileInput.click();
    });

    csvFileInput.addEventListener('change', async (event) => {
      const file = event.target.files?.[0];
      if (!file) {
        return;
      }

      if (!file.name.toLowerCase().endsWith('.csv')) {
        setStatus('Only .csv files are accepted for import.', 'error');
        event.target.value = '';
        return;
      }

      try {
        const text = await file.text();
        const rows = parseCsv(text).filter((row) => row.some((cell) => String(cell).trim() !== ''));
        if (!rows.length) {
          setStatus('The selected CSV file is empty.', 'error');
          event.target.value = '';
          return;
        }

        const vesselName = extractVesselName(rows, file.name);
        const targetColumn = findVesselColumn(vesselName);
        if (targetColumn === -1) {
          const availableHeaders = vesselHeaders.map((header) => String(header).trim()).filter(Boolean).join(', ');
          setStatus(`No matching vessel column was found for "${vesselName || 'unknown vessel'}". Row 1 currently contains: ${availableHeaders || 'no vessel names'}.`, 'error');
          event.target.value = '';
          return;
        }

        const importedValues = extractImportValues(rows);
        importedValues.forEach(({ rowIndex, value }) => {
          const oldValue = matrixData[rowIndex]?.[targetColumn] ?? '';
          if (oldValue !== value) {
            matrixData[rowIndex][targetColumn] = value;
            addEventLogEntry(makeCellId(rowIndex + 2, targetColumn + 2), oldValue, value);
          }
        });

        saveState();
        renderTable();
        setStatus(`Imported DMT-mapped certificate due dates into ${vesselHeaders[targetColumn]} across ${importedValues.length} certificate rows.`, 'success');
      } catch (error) {
        console.error('CSV import failed:', error);
        setStatus(`Unable to import the selected CSV file. ${error?.message || 'Please check the browser console for details.'}`, 'error');
      }

      event.target.value = '';
    });

    horizontalScroll.addEventListener('input', (event) => {
      tableWrap.scrollLeft = Number(event.target.value);
    });

    verticalScroll.addEventListener('input', (event) => {
      tableWrap.scrollTop = Number(event.target.value);
    });

    scrollLeftBtn.addEventListener('click', () => {
      tableWrap.scrollBy({ left: -makeStepSizes().horizontal, behavior: 'smooth' });
    });

    scrollRightBtn.addEventListener('click', () => {
      tableWrap.scrollBy({ left: makeStepSizes().horizontal, behavior: 'smooth' });
    });

    scrollUpBtn.addEventListener('click', () => {
      tableWrap.scrollBy({ top: -makeStepSizes().vertical, behavior: 'smooth' });
    });

    scrollDownBtn.addEventListener('click', () => {
      tableWrap.scrollBy({ top: makeStepSizes().vertical, behavior: 'smooth' });
    });

    tableWrap.addEventListener('scroll', syncScrollControls);
    window.addEventListener('resize', () => {
      syncPaneHeights();
      syncScrollControls();
    });

    renderTable();
    ensureSessionNotice();
  </script>
</body>
</html>
