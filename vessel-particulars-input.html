<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vessel Particulars | DockPilot</title>
  <style>
    :root {
      --edge-padding: clamp(12px, 1.6vw, 22px);
      --text: #eef4ff;
      --muted: #aebcda;
      --accent: #67d6ff;
      --ok: #8ef0b1;
      --warn: #ffd28c;
      --border: rgba(255,255,255,0.1);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: var(--edge-padding);
      font-family: Inter, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at top left, #133977 0%, transparent 32%),
        radial-gradient(circle at bottom right, #0f8f98 0%, transparent 30%),
        linear-gradient(135deg, #06111f, #0a1830 40%, #07111e 100%);
      color: var(--text);
    }

    main {
      width: min(980px, 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(9,16,32,.92), rgba(8,12,25,.95));
      box-shadow: var(--shadow);
      padding: clamp(20px, 2.2vw, 30px);
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 2.4vw, 2.2rem);
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .return-link {
      margin-top: 10px;
      width: fit-content;
      text-decoration: none;
      color: #06263a;
      background: var(--accent);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 700;
    }

    .return-link:focus-visible {
      outline: 2px solid rgba(103,214,255,.5);
      outline-offset: 2px;
    }

    .return-link:hover,
    .return-link:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(103,214,255,.60);
      background: linear-gradient(135deg, rgba(10,55,120,.80), rgba(8,110,130,.72));
      color: #eef4ff;
    }

    .context-banner {
      display: grid;
      gap: 6px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(103, 214, 255, 0.22);
      background: rgba(103, 214, 255, 0.06);
      font-size: 0.84rem;
    }

    .context-banner-title {
      font-weight: 700;
      color: var(--accent);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .context-banner-row {
      display: flex;
      gap: 8px;
      color: var(--muted);
    }

    .context-banner-row strong {
      color: var(--text);
      min-width: 110px;
    }

    .context-banner.missing {
      border-color: rgba(255, 210, 140, 0.22);
      background: rgba(255, 210, 140, 0.06);
    }

    .context-banner.missing .context-banner-title {
      color: var(--warn);
    }
  </style>
</head>
<body>
  <main>
    <h1>Vessel Particulars</h1>
    <div id="contextBanner" class="context-banner" aria-label="Vessel selection context"></div>
    <p>This page scaffold is ready for feature implementation.</p>
    <a class="return-link" href="./vessel-selector.html">Return to Vessel Selector</a>
  </main>

  <script type="module">
    import { supabase } from './supabaseClient.js';
    import { startDockPilotPageGuard } from './dockpilotPageGuard.js';

    const VP_CONTEXT_KEY = 'DOCKPILOT_VP_CONTEXT';
    const contextBanner = document.getElementById('contextBanner');

    function renderContextBanner() {
      let context = null;
      try {
        const raw = localStorage.getItem(VP_CONTEXT_KEY);
        const parsed = raw ? JSON.parse(raw) : null;
        if (parsed && typeof parsed === 'object' && parsed.vesselName) {
          context = parsed;
        }
      } catch {
        context = null;
      }

      if (!context) {
        contextBanner.classList.add('missing');
        contextBanner.innerHTML = `
          <span class="context-banner-title">No Selection Context</span>
          <span class="context-banner-row">No vessel filter criteria were passed. Please return to Fleet Composition and populate all 4 filters before opening this page.</span>
        `;
        return;
      }

      contextBanner.innerHTML = `
        <span class="context-banner-title">Selected Vessel Context</span>
        <div class="context-banner-row"><strong>Fleet Group</strong><span>${escapeHtml(context.fleetGroup || '—')}</span></div>
        <div class="context-banner-row"><strong>TM / FM</strong><span>${escapeHtml(context.managerName || '—')}</span></div>
        <div class="context-banner-row"><strong>Vessel Name</strong><span>${escapeHtml(context.vesselName || '—')}</span></div>
        <div class="context-banner-row"><strong>TSI Name</strong><span>${escapeHtml(context.tsiName || '—')}</span></div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[char]));
    }

    startDockPilotPageGuard({
      supabase,
      landingPage: './DockPilot_landing.html'
    }).then(() => {
      renderContextBanner();
    }).catch((error) => {
      console.error('DockPilot guard startup failed:', error);
      window.location.href = './DockPilot_landing.html';
    });
  </script>
</body>
</html>
