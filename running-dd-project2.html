<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Running DD Project | DockPilot</title>
  <style>
    :root {
      --edge-padding: clamp(12px, 1.6vw, 22px);
      --text: #eef4ff;
      --muted: #aebcda;
      --accent: #67d6ff;
      --border: rgba(255,255,255,0.1);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: var(--edge-padding);
      font-family: Inter, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at top left, #133977 0%, transparent 32%),
        radial-gradient(circle at bottom right, #0f8f98 0%, transparent 30%),
        linear-gradient(135deg, #06111f, #0a1830 40%, #07111e 100%);
      color: var(--text);
    }

    main {
      width: min(980px, 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(9,16,32,.92), rgba(8,12,25,.95));
      box-shadow: var(--shadow);
      padding: clamp(20px, 2.2vw, 30px);
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 2.4vw, 2.2rem);
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .return-link {
      margin-top: 10px;
      width: fit-content;
      text-decoration: none;
      color: #06263a;
      background: var(--accent);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 700;
    }

    .return-link:focus-visible {
      outline: 2px solid rgba(103,214,255,.5);
      outline-offset: 2px;
    }

    .return-link:hover,
    .return-link:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(103,214,255,.60);
      background: linear-gradient(135deg, rgba(10,55,120,.80), rgba(8,110,130,.72));
      color: #eef4ff;
    }
  </style>
</head>
<body>
  <main>
    <h1>Running DD Project</h1>
    <p>This page scaffold is ready for feature implementation.</p>
    <a class="return-link" href="./Frontpage.html">Return to Frontpage</a>
  </main>

  <script type="module">
    import { supabase } from './supabaseClient.js';
    import { startDockPilotPageGuard } from './dockpilotPageGuard.js';
    import { loadSavedTheme } from './dockpilotTheme.js';

    // Apply saved theme before anything renders
    loadSavedTheme();

    startDockPilotPageGuard({
      supabase,
      landingPage: './DockPilot_landing.html'
    }).catch((error) => {
      console.error('DockPilot guard startup failed:', error);
      window.location.href = './DockPilot_landing.html';
    });
  </script>
</body>
</html>
